<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kagaz</title>
<style>
  :root {
    --chrome-bg: #fafaf8;
    --chrome-fg: #1c1815;
    --chrome-muted: #6b6b68;
    --chrome-line: #e5e5e2;
    --chrome-panel: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--chrome-bg); color: var(--chrome-fg);
    -webkit-font-smoothing: antialiased;
  }

  /* Phase 1 smoke-test shell — real editor UI lands in Phase 2 */
  .app { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .brand { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin: 0; }
  .brand-sub { font-size: 11px; color: var(--chrome-muted); letter-spacing: 1.5px; text-transform: uppercase; margin: 4px 0 24px; }
  .phase-notice { font-size: 12px; color: var(--chrome-muted); font-style: italic; margin-bottom: 20px; padding: 10px 14px; background: #fffbee; border: 1px solid #f0e8c0; border-radius: 4px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .btn { background: var(--chrome-fg); color: #fff; border: none; padding: 8px 14px; border-radius: 4px; font-family: inherit; font-size: 12px; cursor: pointer; }
  .btn.secondary { background: transparent; color: var(--chrome-fg); border: 1px solid var(--chrome-line); }
  .btn:hover { opacity: 0.85; }
  #preview { border: 1px solid var(--chrome-line); border-radius: 6px; overflow: hidden; background: #fff; }
  #status { font-size: 11px; color: var(--chrome-muted); margin-top: 12px; font-family: ui-monospace, Menlo, Consolas, monospace; }
</style>
</head>
<body>
<div class="app">
  <h1 class="brand">Kagaz</h1>
  <p class="brand-sub">काग़ज़ · paper</p>
  <div class="phase-notice">Phase 1 engine — smoke-test harness. Full editor UI lands in Phase 2.</div>
  <div class="toolbar">
    <button class="btn" id="loadDemo">Load demo project</button>
    <button class="btn secondary" id="openFile">Open .kagaz</button>
    <button class="btn secondary" id="saveFile">Save .kagaz</button>
    <button class="btn secondary" id="exportSite">Export site</button>
  </div>
  <div id="preview"></div>
  <div id="status"></div>
</div>

//   6. SLOT_DEFS         (locked slot vocabulary, per spec)

const LAYOUT_STORIES = {
  monolith: "<p>For the person with one thing to say. A writer between books, a designer between projects, someone announcing a sabbatical or a launch. The page <em>is</em> the statement — nothing else competes with it.</p><p>Big type carries authority. Best paired with the cleanest palettes (MUJI, BAIZI, CHUNA) to let the words breathe, or with the most severe (SUMI, KAJAL, KARI) when the authority needs gravity.</p>",

  atelier: "<p>For the maker who wants identity and output visible together. The two-column structure lets you say who you are while showing what you've made, in the same eyeful.</p><p>The editorial typography signals 'I am a craftsperson, this is my workshop.' Best for architects, designers, small studios, anyone whose practice is the brand.</p>",

  index: "<p>For the prolific. The site is a list of things you've made or written, and the structure stays out of the way. Inspired by Simon Willison's blog, by 90s academic homepages, by anyone whose value is the volume and quality of their archive.</p><p>Sparse decoration on purpose — the work IS the design.</p>",

  card: "<p>For the creator whose site is a router. Musicians, podcasters, influencers, anyone whose visitors arrive looking to be sent somewhere else. Mobile-first, vertically stacked, big tap targets.</p><p>The taste comes from pairing the linktree pattern with a real palette and real typography instead of generic SaaS chrome.</p>",

  salon: "<p>For the public figure who needs the full set: a proper homepage, navigation, multiple sections, a real 'house on the internet'. Conservative structure on purpose — it's the layout that doesn't surprise visitors.</p><p>Best for academics, public intellectuals, founders, anyone whose audience expects a conventional personal site.</p>",

  split: "<p>For the visual professional. The image side shows the work — a portfolio shot, a self-portrait, a piece of identity. The text side carries the words.</p><p>The 50/50 split refuses to let either dominate, which is the point: visual people whose words also matter. Photographers, designers, illustrators, art directors.</p>",

  marquee: "<p>For the person whose site is itself a piece of design. Type-as-art. The name fills the page because the page <em>is</em> the brand.</p><p>Best for designers and design-adjacent professionals who want their site to demonstrate, not describe, their taste. Pairs hardest with the boldest palettes — HALDI, ZHUSHA, KAALI.</p>",

  tile: "<p>For visual portfolios where the work is image-based. Inspired by Instagram grids, contact sheets, gallery wall arrangements.</p><p>The grid is unforgiving — every tile competes with every other — which forces curation. Best for photographers, illustrators, designers with a body of visual work. When images are missing, the tiles fall back to palette colors so empty states look composed on purpose.</p>",

  dossier: "<p>For the formal context. Looks like a printed CV or a gallery handout. The user is signaling 'I am serious, I want to be evaluated on substance.'</p><p>Best for academics, consultants, lawyers, anyone whose professional context expects a document-shaped artifact.</p>",

  terminal: "<p>For developers, hackers, sysadmins, anyone whose identity is wrapped up in the command line. In dark palettes (URUSHI, QIQI, KAALI) it reads as a real terminal session. In light palettes (KINARI, KHADI) it reads as a typewritten code listing.</p><p>Either way, the message is 'I am of the machine.'</p>",

  frame: "<p>For the artist with a single piece to present. The matted border treats the content like a print on a wall — bordered, framed, presented.</p><p>Best when there's exactly one thing to show: an announcement, a project launch, a personal statement, a gallery opening.</p>",

  letter: "<p>For intimacy. Writers, essayists, anyone whose relationship with their visitors is personal rather than professional.</p><p>The format borrows from physical correspondence — date, salutation, body, signature — to make a website feel like an actual address from one person to another. Pairs naturally with the warmer palettes (KINARI, KHADI, MIZHI, CHANDANA).</p>",

  newspaper: "<p>For journalists, editors, publishers, anyone whose work is editorial in shape. The masthead carries authority; the column grid implies a publication, not a person.</p><p>Best when you want the site to feel like an institution you edit, even if the institution is just you.</p>",

  poster: "<p>For musicians, event organizers, performers, gig promoters. The hierarchy mirrors a printed gig poster: enormous name, list of dates or projects, dotted leader lines.</p><p>The user is announcing themselves as a presence with shows to attend, even if the 'shows' are projects.</p>",

  manifesto: "<p>For the opinionated. Founders explaining their thesis, activists making a case, writers staking ground. The long-form single page treats the visitor as someone who came to read, not browse.</p><p>The pull quote breaks the wall of text and lets you front-load the most quotable line. Pairs with the serious palettes (SUMI, KAJAL, KARI, NEEL).</p>",
};

function detectIcon(url) {
  if (!url) return "link";
  const u = url.toLowerCase();
  for (const { id, patterns } of SLOT_DEFS.iconPatterns) {
    for (const p of patterns) {
      if (u.includes(p)) return id;
    }
  }
  return "link";
}

// -----------------------------------------------------------------------------
// Content helpers — every user-content interpolation MUST flow through these.
// -----------------------------------------------------------------------------
// esc(s)      — HTML-escape a string for safe text interpolation
// md(s)       — Phase 1 minimal markdown: escape + paragraph-wrap (for longtext)
//               TODO(phase-2): replace with marked.js when Tiptap is wired
// safeUrl(u)  — reject javascript:/data:/vbscript: schemes, escape for href/src
// imgUrl(ref) — resolve {asset, alt} image ref → blob URL via current assetMap
// icon(id)    — return inline SVG string for one of the 14 baked-in icons
const ESC_MAP = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" };
function esc(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ESC_MAP[c]);
}
function md(s) {
  if (s == null) return "";
  const text = String(s).trim();
  if (!text) return "";
  return text.split(/\n\s*\n/).map(p => `<p>${esc(p).replace(/\n/g, "<br>")}</p>`).join("");
}
function safeUrl(u) {
  if (u == null) return "#";
  const s = String(u).trim();
  if (!s) return "#";
  if (/^(javascript|data|vbscript):/i.test(s)) return "#";
  return esc(s);
}
let __ASSET_MAP = null; // set by the render entry point; reset per render call
function imgUrl(ref) {
  if (!ref || !ref.asset || !__ASSET_MAP) return null;
  const entry = __ASSET_MAP.get(ref.asset);
  return entry ? entry.url : null;
}
function icon(id) {
  return ICONS[id] || ICONS.link;
}

// -----------------------------------------------------------------------------
// 9. FILE_FORMAT — .kagaz zip load/save + static site export
// -----------------------------------------------------------------------------
// A .kagaz file is a zip containing:
//   project.json   — flat slot-keyed project data (see specs/file-format.md)
//   assets/        — one file per referenced image asset, named {id}.{ext}
//
// loadKagazFile:  File      → project (with assetMap of blob URLs)
// saveKagazFile:  project   → Blob   (drops orphan assets)
// exportSite:     project   → Blob   (renders HTML + copies assets + drops source)

// JSZip is lazy-loaded from CDN the first time any file op is called.
// Cached as a promise so repeated calls reuse the one fetch.
let __JSZipPromise = null;
function loadJSZip() {
  if (!__JSZipPromise) {
    __JSZipPromise = import("https://cdn.jsdelivr.net/npm/jszip@3/+esm")
      .then(mod => mod.default || mod.JSZip || mod)
      .catch(err => {
        __JSZipPromise = null; // allow retry
        throw new Error("Failed to load JSZip from CDN: " + err.message);
      });
  }
  return __JSZipPromise;
}

// Walk a project, collect every referenced asset id from image / list / site
// slots. Used by save (drop orphans) and export (copy to site/assets/).
function collectAssetRefs(project) {
  const refs = new Set();
  const visit = (v) => {
    if (v == null || typeof v !== "object") return;
    if (Array.isArray(v)) { v.forEach(visit); return; }
    if (typeof v.asset === "string") { refs.add(v.asset); return; }
    for (const k in v) visit(v[k]);
  };
  visit(project.site);
  visit(project.pages);
  return refs;
}

// Serialize a project to JSON, stripping runtime-only fields (assetMap).
function projectToJson(project) {
  const { assetMap, ...serializable } = project;
  return JSON.stringify(serializable, null, 2);
}

// Turn a file extension into a mime type for Blob reconstruction on load.
function mimeFromExt(ext) {
  return {
    jpg: "image/jpeg", jpeg: "image/jpeg", png: "image/png",
    gif: "image/gif", webp: "image/webp", svg: "image/svg+xml"
  }[String(ext).toLowerCase()] || "";
}

// Load a .kagaz file. Returns a project with assetMap (Map<id, {url, blob, mime, ext}>).
// Throws on malformed zips, missing project.json, or future kagazVersion.
async function loadKagazFile(file) {
  const JSZip = await loadJSZip();
  const zip = await JSZip.loadAsync(file);

  const projectEntry = zip.file("project.json");
  if (!projectEntry) throw new Error("Not a valid .kagaz file: missing project.json");

  let project;
  try {
    project = JSON.parse(await projectEntry.async("string"));
  } catch (e) {
    throw new Error("project.json is not valid JSON: " + e.message);
  }

  // Version gate per specs/file-format.md §Versioning
  const v = project.kagazVersion;
  if (v == null) throw new Error("project.json: missing kagazVersion");
  if (v > 1) throw new Error(`This file was made with Kagaz v${v}. Please update Kagaz.`);
  // v < 1 would run forward migrations; v1 has no prior.

  // Build asset map — one blob URL per file under assets/
  const assetMap = new Map();
  const assetFolder = zip.folder("assets");
  if (assetFolder) {
    const tasks = [];
    assetFolder.forEach((relativePath, zipFile) => {
      if (zipFile.dir) return;
      const m = relativePath.match(/^(img-[\w-]+)\.([a-z0-9]+)$/i);
      if (!m) return; // unknown filename shape, skip
      const [, id, ext] = m;
      tasks.push(
        zipFile.async("blob").then(rawBlob => {
          const mime = rawBlob.type || mimeFromExt(ext);
          const blob = mime ? new Blob([rawBlob], { type: mime }) : rawBlob;
          assetMap.set(id, { url: URL.createObjectURL(blob), blob, mime, ext });
        })
      );
    });
    await Promise.all(tasks);
  }
  project.assetMap = assetMap;
  return project;
}

// Save a project to a .kagaz Blob.
// - Updates updatedAt to now
// - Drops orphan assets (present in assetMap but not referenced in content)
// - Only referenced assets are written to the output zip
async function saveKagazFile(project) {
  const JSZip = await loadJSZip();
  const zip = new JSZip();

  const snapshot = {
    ...project,
    updatedAt: new Date().toISOString(),
  };
  // assetMap is runtime-only; projectToJson strips it
  zip.file("project.json", projectToJson(snapshot));

  const refs = collectAssetRefs(project);
  if (project.assetMap && refs.size > 0) {
    const assetFolder = zip.folder("assets");
    for (const id of refs) {
      const entry = project.assetMap.get(id);
      if (!entry) continue; // content references an asset that isn't in memory; skip silently
      const ext = entry.ext || "bin";
      assetFolder.file(`${id}.${ext}`, entry.blob);
    }
  }

  return zip.generateAsync({ type: "blob" });
}

// Build the per-page HTML shell. Inlines palette CSS vars + typography CSS
// vars, emits meta/OG tags, favicon link if present. Every user-string
// interpolation goes through esc() — title/description include user content.
function buildHtmlShell({ title, description, faviconPath, palette, typography, body }) {
  const p = palette.slots;
  const t = esc(title);
  const d = esc(description);
  const faviconTag = faviconPath ? `\n<link rel="icon" type="image/png" href="${esc(faviconPath)}">` : "";
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${t}</title>
<meta name="description" content="${d}">
<meta property="og:title" content="${t}">
<meta property="og:description" content="${d}">
<meta property="og:type" content="website">${faviconTag}
<style>
  :root {
    --kg-display: ${typography.display};
    --kg-body: ${typography.body};
    --kg-mono: ${typography.mono};
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: ${p.BODY};
    color: ${p.INK};
    font-family: var(--kg-body);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: inherit; }
</style>
</head>
<body>
${body}
</body>
</html>`;
}

// Generate a 32x32 PNG favicon from the site_avatar image ref.
// Browsers accept PNG bytes written as favicon.png via <link rel="icon">.
// Returns a Blob, or null if no avatar is set / decode fails.
async function generateFavicon(avatarRef, assetMap) {
  if (!avatarRef || !avatarRef.asset || !assetMap) return null;
  const entry = assetMap.get(avatarRef.asset);
  if (!entry) return null;

  const img = new Image();
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = () => reject(new Error("Failed to decode avatar for favicon"));
    img.src = entry.url;
  });

  const canvas = document.createElement("canvas");
  canvas.width = 32;
  canvas.height = 32;
  const ctx = canvas.getContext("2d");
  // Center-crop to square, then scale to 32x32
  const w = img.naturalWidth || img.width;
  const h = img.naturalHeight || img.height;
  const s = Math.min(w, h);
  const sx = (w - s) / 2;
  const sy = (h - s) / 2;
  ctx.drawImage(img, sx, sy, s, s, 0, 0, 32, 32);

  return new Promise((resolve, reject) => {
    canvas.toBlob(
      blob => blob ? resolve(blob) : reject(new Error("favicon toBlob returned null")),
      "image/png"
    );
  });
}

// Export a project as a deployable static site zip.
// Pipeline per specs/file-format.md §Export sequence + specs/v1-spec.md §12:
//   1. Validate combination (layout / palette / typography all exist)
//   2. Determine exportable pages: pageOrder ∩ layout.supportedPages ∩ has-render
//   3. Build an "export-mode" project whose asset URLs resolve to deployment
//      paths (assets/{id}.{ext}) instead of blob: URLs
//   4. Generate favicon from site_avatar if present
//   5. Render each exported page, wrap in HTML shell, write to zip root
//   6. Copy referenced assets into assets/ (orphans dropped)
//   7. Drop source.kagaz alongside so the user always has both artifacts
async function exportSite(project) {
  const JSZip = await loadJSZip();
  const zip = new JSZip();

  // 1. Validate combination
  const combo = project.combination || {};
  const layout = LAYOUTS.find(L => L.id === combo.layoutId);
  if (!layout) throw new Error("Unknown layout: " + combo.layoutId);
  const palette = PALETTES.find(p => p.id === combo.paletteId);
  if (!palette) throw new Error("Unknown palette: " + combo.paletteId);
  const typography = TYPOGRAPHIES.find(t => t.id === combo.typographyId);
  if (!typography) throw new Error("Unknown typography: " + combo.typographyId);

  // 2. Which pages are actually exportable
  const supported = SLOT_DEFS.layoutPages[layout.id] || [];
  const pageOrder = project.pageOrder || [];
  let exportedPageIds = pageOrder.filter(pid => supported.includes(pid) && layout.pages[pid]);
  if (exportedPageIds.length === 0) {
    // Fallback: any supported page with a render, primary first
    const primary = supported.find(pid => layout.pages[pid]);
    if (!primary) throw new Error(`Layout ${layout.id} has no renderable pages`);
    exportedPageIds = [primary];
  }

  // 3. Export-mode project: asset URLs swapped to deployment paths
  const exportAssetMap = new Map();
  if (project.assetMap) {
    for (const [id, entry] of project.assetMap) {
      exportAssetMap.set(id, { ...entry, url: `assets/${id}.${entry.ext || "bin"}` });
    }
  }
  const exportProject = {
    ...project,
    assetMap: exportAssetMap,
    exportedPageIds, // layouts that render nav read this via content
  };

  // 4. Favicon
  let faviconPath = null;
  try {
    const fav = await generateFavicon(project.site && project.site.site_avatar, project.assetMap);
    if (fav) {
      zip.file("favicon.png", fav);
      faviconPath = "favicon.png";
    }
  } catch (err) {
    console.warn("Favicon generation failed, skipping:", err);
  }

  // 5. Render each page
  const site = project.site || {};
  const homePage = (project.pages && project.pages.home) || {};
  const title = site.site_name || "Untitled";
  const description = site.site_tagline || homePage.home_sub || "";

  const savedMap = __ASSET_MAP;
  __ASSET_MAP = exportAssetMap;
  try {
    for (const pid of exportedPageIds) {
      const content = buildPageContent(exportProject, pid);
      content.exportedPageIds = exportedPageIds;
      const body = layout.pages[pid](content, palette.slots);
      const html = buildHtmlShell({ title, description, faviconPath, palette, typography, body });
      const filename = pid === "home" ? "index.html" : `${pid}.html`;
      zip.file(filename, html);
    }
  } finally {
    __ASSET_MAP = savedMap;
  }

  // 6. Copy referenced assets (orphans dropped)
  const refs = collectAssetRefs(project);
  if (project.assetMap && refs.size > 0) {
    const assetFolder = zip.folder("assets");
    for (const id of refs) {
      const entry = project.assetMap.get(id);
      if (!entry) continue;
      assetFolder.file(`${id}.${entry.ext || "bin"}`, entry.blob);
    }
  }

  // 7. Embed source.kagaz alongside
  try {
    const sourceBlob = await saveKagazFile(project);
    zip.file("source.kagaz", sourceBlob);
  } catch (err) {
    console.warn("Failed to embed source.kagaz:", err);
  }

  return zip.generateAsync({ type: "blob" });
}

// ----- Small browser utilities used by the button wiring -----
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function slugify(s) {
  return String(s || "untitled").toLowerCase().trim()
    .replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "untitled";
}

async function withLoadingState(btn, label, fn) {
  const orig = btn.textContent;
  btn.textContent = label;
  btn.disabled = true;
  try { return await fn(); }
  finally { btn.textContent = orig; btn.disabled = false; }
}

// -----------------------------------------------------------------------------
// Render entry point — builds the per-page content view and calls the layout.
// -----------------------------------------------------------------------------
function buildPageContent(project, pageId) {
  return {
    site: project.site || {},
    page: (project.pages || {})[pageId] || {},
    pageId,
    pageOrder: project.pageOrder || [pageId],
    allPages: project.pages || {}, // Phase 1: layouts that surface multiple pages
                                    // on the home render read sibling pages here.
    assetMap: project.assetMap || null,
  };
}

function renderPage(project, layoutId, pageId, paletteId, typographyId) {
  const layout = LAYOUTS.find(L => L.id === layoutId);
  if (!layout) throw new Error("Unknown layout: " + layoutId);
  const pageRender = layout.pages[pageId];
  if (!pageRender) throw new Error(`Layout ${layoutId} has no render for page ${pageId}`);
  const palette = PALETTES.find(p => p.id === paletteId);
  if (!palette) throw new Error("Unknown palette: " + paletteId);
  const typography = TYPOGRAPHIES.find(t => t.id === typographyId);
  if (!typography) throw new Error("Unknown typography: " + typographyId);
  __ASSET_MAP = project.assetMap || null;
  const content = buildPageContent(project, pageId);
  const body = pageRender(content, palette.slots);
  // Wrap in a host div that sets the typography CSS vars
  return `<div style="--kg-display:${typography.display};--kg-body:${typography.body};--kg-mono:${typography.mono};">${body}</div>`;
}

const $ = (sel) => document.querySelector(sel);
const setStatus = (msg) => { $("#status").textContent = msg; };

// The currently loaded project. Set by Load Demo / Open, read by Save / Export.
let __currentProject = null;

// Render the current project's primary page using its combination.
function renderCurrentProject(note) {
  if (!__currentProject) { setStatus("No project loaded."); return; }
  const combo = __currentProject.combination;
  const layout = LAYOUTS.find(L => L.id === combo.layoutId);
  if (!layout) { setStatus("Unknown layout: " + combo.layoutId); return; }
  const pages = SLOT_DEFS.layoutPages[layout.id];
  if (!pages || !pages.length) { setStatus("Layout has no supported pages: " + layout.id); return; }
  const pageId = pages[0];
  try {
    $("#preview").innerHTML = renderPage(__currentProject, layout.id, pageId, combo.paletteId, combo.typographyId);
    const name = __currentProject.site && __currentProject.site.site_name;
    const prefix = note ? note + " · " : "";
    setStatus(`${prefix}${name || "Untitled"} · ${layout.name} · ${combo.paletteId} · ${combo.typographyId}`);
  } catch (err) {
    $("#preview").innerHTML = `<div style="padding:20px;color:#c81018;font-family:ui-monospace,Menlo,monospace;">Render error in ${layout.id}/${pageId}: ${esc(err.message)}</div>`;
    setStatus(`ERROR in ${layout.id}: ${err.message}`);
    console.error(err);
  }
}

// Dev helper — exposed for console smoke testing. Renders every layout in turn,
// returns an array of {id, pageId, ok, error?} per spec §16 step 6.
window.smokeAllLayouts = function smokeAllLayouts() {
  const results = [];
  for (const L of LAYOUTS) {
    const pid = SLOT_DEFS.layoutPages[L.id][0];
    const combo = DEMO_PROJECT.combination;
    try {
      const html = renderPage(DEMO_PROJECT, L.id, pid, combo.paletteId, combo.typographyId);
      results.push({ id: L.id, pageId: pid, ok: true, len: html.length });
    } catch (err) {
      results.push({ id: L.id, pageId: pid, ok: false, error: err.message });
    }
  }
  return results;
};

});
