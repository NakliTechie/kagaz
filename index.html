      const f = e.target.files && e.target.files[0];
      if (f) processImageFile(f, scope, pageId, slot);
      fileInput.value = "";
    });
    fieldWrap.appendChild(dropZone);
    fieldWrap.appendChild(fileInput);
  }
  wrap.appendChild(fieldWrap);
}

// Canvas-compress an image to JPEG (max 1200px, quality 0.85) and store in assetMap.
async function processImageFile(file, scope, pageId, slot) {
  const id = "img-" + Array.from(crypto.getRandomValues(new Uint8Array(8)))
    .map(b => b.toString(16).padStart(2, "0")).join("");

  const rawUrl = URL.createObjectURL(file);
  const img = new Image();
  try {
    await new Promise((res, rej) => {
      img.onload = res;
      img.onerror = () => rej(new Error("Could not decode image"));
      img.src = rawUrl;
    });
  } finally {
    URL.revokeObjectURL(rawUrl);
  }

  const MAX = 1200;
  let w = img.naturalWidth || img.width;
  let h = img.naturalHeight || img.height;
  if (w > MAX || h > MAX) { const sc = MAX / Math.max(w, h); w = Math.round(w * sc); h = Math.round(h * sc); }

  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(img, 0, 0, w, h);

  const blob = await new Promise((res, rej) =>
    canvas.toBlob(b => b ? res(b) : rej(new Error("Canvas toBlob failed")), "image/jpeg", 0.85)
  );

  const blobUrl = URL.createObjectURL(blob);
  if (!__currentProject.assetMap) __currentProject.assetMap = new Map();
  __currentProject.assetMap.set(id, { url: blobUrl, blob, mime: "image/jpeg", ext: "jpg" });

  writeSlotValue(scope, pageId, slot.name, { asset: id, alt: "" });
  rebuildFormPreservingFocus();
  renderPreview();
}

// Same compression pipeline for images nested inside list items (gallery, work items).
async function _processSubImage(file, scope, pageId, parentSlotName, itemIdx, subSlotName) {
  const id = "img-" + Array.from(crypto.getRandomValues(new Uint8Array(8)))
    .map(b => b.toString(16).padStart(2, "0")).join("");
  const rawUrl = URL.createObjectURL(file);
  const img = new Image();
  try {
    await new Promise((res, rej) => { img.onload = res; img.onerror = () => rej(new Error("decode failed")); img.src = rawUrl; });
  } finally { URL.revokeObjectURL(rawUrl); }
  const MAX = 1200;
  let w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
  if (w > MAX || h > MAX) { const sc = MAX / Math.max(w, h); w = Math.round(w * sc); h = Math.round(h * sc); }
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(img, 0, 0, w, h);
  const blob = await new Promise((res, rej) =>
    canvas.toBlob(b => b ? res(b) : rej(new Error("toBlob failed")), "image/jpeg", 0.85)
  );
  const blobUrl = URL.createObjectURL(blob);
  if (!__currentProject.assetMap) __currentProject.assetMap = new Map();
  __currentProject.assetMap.set(id, { url: blobUrl, blob, mime: "image/jpeg", ext: "jpg" });
  const list = readSlotValue(scope, pageId, parentSlotName) || [];
  if (list[itemIdx]) { list[itemIdx][subSlotName] = { asset: id, alt: "" }; writeSlotValue(scope, pageId, parentSlotName, list); }
  rebuildFormPreservingFocus();
  renderPreview();
}

// ── Form rebuild that preserves focus on the active element if possible.
//    Used by list/links add/remove/reorder where the form structure changes.
function rebuildFormPreservingFocus() {
  const active = document.activeElement;
  let focusKey = null;
  if (active && active.tagName === "INPUT" && active.dataset) {
    // Build a key that identifies the element so we can re-focus after rebuild
    focusKey = JSON.stringify({
      tag: active.tagName,
      slot: active.dataset.slotName || active.dataset.parentSlot,
      sub: active.dataset.subSlot,
      idx: active.dataset.itemIdx,
      scope: active.dataset.scope,
      pageId: active.dataset.pageId,
    });
  }
  const combo = __currentProject.combination;
  const layout = LAYOUTS.find(L => L.id === combo.layoutId);
  if (!layout) return;
  renderForm(layout);
  if (focusKey) {
    // Re-focus the matching element if it still exists after rebuild
    for (const el of document.querySelectorAll(".form-col input, .form-col textarea")) {
      const key = JSON.stringify({
        tag: el.tagName,
        slot: el.dataset.slotName || el.dataset.parentSlot,
        sub: el.dataset.subSlot,
        idx: el.dataset.itemIdx,
        scope: el.dataset.scope,
        pageId: el.dataset.pageId,
      });
      if (key === focusKey) { el.focus(); break; }
    }
  }
}

function refreshStatusFromProject() {
  const combo = __currentProject && __currentProject.combination;
  if (!combo) return;

}

// ── Read / write a slot value through __currentProject ──────────────────────
function readSlotValue(scope, pageId, slotName) {
  if (!__currentProject) return undefined;
  if (scope === "site") {
    return __currentProject.site && __currentProject.site[slotName];
  }
  if (scope === "page") {
    const page = __currentProject.pages && __currentProject.pages[pageId];
    return page && page[slotName];
  }
  return undefined;
}

function writeSlotValue(scope, pageId, slotName, value) {
  if (!__currentProject) return;
  if (scope === "site") {
    if (!__currentProject.site) __currentProject.site = {};
    __currentProject.site[slotName] = value;
  } else if (scope === "page") {
    if (!__currentProject.pages) __currentProject.pages = {};
    if (!__currentProject.pages[pageId]) __currentProject.pages[pageId] = {};
    __currentProject.pages[pageId][slotName] = value;
  }
}

// Text field change handler — updates the project + re-renders the preview.

  const combo = __currentProject.combination;
  const layout = LAYOUTS.find(L => L.id === combo.layoutId);
  if (layout) setStatusFromProject(layout, combo);
}

// ── Preview rendering — separated from renderEditor so input changes don't
//    rebuild the form (which would lose focus / caret position).
function renderPreview() {
  if (!__currentProject) { $("#preview").innerHTML = ""; return; }
  const combo = __currentProject.combination;
  const layout = LAYOUTS.find(L => L.id === combo.layoutId);
  if (!layout) return;
  try {
    $("#preview").innerHTML = renderPage(__currentProject, layout.id, __currentPageId, combo.paletteId, combo.typographyId);

    console.error(err);
  }
}

// ── Preview button ─────────────────────────────────────────────────────────
// Export-to-memory: run the export pipeline without downloading, rewrite
// inter-page hrefs to blob: URLs, open the home page in a new tab.
$("#previewSiteBtn").addEventListener("click", async () => {
  if (!__currentProject) { setStatus("Load a project first."); return; }
  const btn = $("#previewSiteBtn");
  try {
    await withLoadingState(btn, "building…", async () => {
      const JSZip = await loadJSZip();
      const combo = __currentProject.combination || {};
      const layout = LAYOUTS.find(L => L.id === combo.layoutId);
      const palette = PALETTES.find(p => p.id === combo.paletteId);
      const typography = TYPOGRAPHIES.find(t => t.id === combo.typographyId);
      if (!layout || !palette || !typography) throw new Error("Invalid combination");

      const supported = SLOT_DEFS.layoutPages[layout.id] || [];
      const pageOrder = (__currentProject.pageOrder || []).filter(pid => supported.includes(pid) && layout.pages[pid]);
      const exportedPageIds = pageOrder.length ? pageOrder : [supported.find(pid => layout.pages[pid])].filter(Boolean);
      if (!exportedPageIds.length) throw new Error("No renderable pages");

      // Build blob-URL asset map for in-memory render
      const blobAssetMap = new Map();
      if (__currentProject.assetMap) {
        for (const [id, entry] of __currentProject.assetMap) {
          blobAssetMap.set(id, { ...entry }); // url is already a blob: URL
        }
      }
      const previewProject = { ...__currentProject, assetMap: blobAssetMap, exportedPageIds };

      const savedMap = __ASSET_MAP;
      __ASSET_MAP = blobAssetMap;
      const pageBlobs = {};
      try {
        for (const pid of exportedPageIds) {
          const content = buildPageContent(previewProject, pid);
          content.exportedPageIds = exportedPageIds;
          const body = layout.pages[pid](content, palette.slots);
          // Rewrite inter-page hrefs to "#" since we can't link blobs to each other easily
          const html = buildHtmlShell({ title: (__currentProject.site||{}).site_name || "Preview", description: "", faviconPath: null, palette, typography, body });
          pageBlobs[pid] = URL.createObjectURL(new Blob([html], { type: "text/html" }));
        }
      } finally {
        __ASSET_MAP = savedMap;
      }

      const homeUrl = pageBlobs["home"] || pageBlobs[exportedPageIds[0]];
      const win = window.open(homeUrl, "_blank");
      if (!win) { setStatus("Pop-up blocked — allow pop-ups for this page and try again."); }

      // Revoke blobs after a delay (browser caches the page by then)
      setTimeout(() => { for (const url of Object.values(pageBlobs)) URL.revokeObjectURL(url); }, 30000);
      setStatus("Preview opened in new tab.");
    });
  } catch (err) {
    setStatus("Preview failed: " + err.message);
    console.error(err);
  }
});

// ── Autosave — 30 s timer writes project.json (no assets) to localStorage ───
// On reload, if the key exists and is newer than the last Save, show the
// restore toast. Image-loss caveat is documented in the toast.
const AUTOSAVE_KEY = "kagaz.autosave";

function autosave() {
  if (!__currentProject) return;
  try {
    const { assetMap, ...serializable } = __currentProject;
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({
      savedAt: new Date().toISOString(),
      project: serializable,
    }));
  } catch (e) {
    // localStorage full or unavailable — silently skip
  }
}

let __autosaveTimer = null;
function startAutosaveTimer() {
  if (__autosaveTimer) clearInterval(__autosaveTimer);
  __autosaveTimer = setInterval(autosave, 30000);
}

// Hook autosave into renderEditor so the timer starts as soon as a project loads
const _origRenderEditor = renderEditor;
// eslint-disable-next-line no-global-assign
renderEditor = function(...args) {
  _origRenderEditor(...args);
  startAutosaveTimer();
};

// Check for autosave on page load
(function checkAutosave() {
  try {
    const raw = localStorage.getItem(AUTOSAVE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (!saved || !saved.project) return;
    const siteName = (saved.project.site && saved.project.site.site_name) || "Untitled";
    const when = saved.savedAt ? new Date(saved.savedAt).toLocaleTimeString() : "earlier";
    document.getElementById("restoreMsg").textContent =
      `Autosaved project "${siteName}" found (${when}) — images not included`;
    const toast = document.getElementById("restoreToast");
    toast.style.display = "flex";
    document.getElementById("restoreYes").addEventListener("click", () => {
      toast.style.display = "none";
      __currentProject = { ...saved.project, assetMap: new Map() };
      __currentPageId = null;
      renderEditor("Restored autosaved project (images cleared — re-open your .kagaz to restore them)");
      localStorage.removeItem(AUTOSAVE_KEY);
    });
    document.getElementById("restoreNo").addEventListener("click", () => {
      toast.style.display = "none";
    });
  } catch (e) { /* malformed autosave — ignore */ }
})();

// ── Soft length hints — updated in buildTextField / buildLongtextField ────────
// Limits per slot type (soft — yellow at 2×, no hard block):
// Human-readable labels for every slot name. buildField uses these instead of
// showing the raw underscore-separated slot key. Falls back to a capitalised
// slug-split if a slot is ever added without a label entry.
const SLOT_LABELS = {
  // site
  site_name: "Site name", site_tagline: "Tagline",
  site_avatar: "Avatar photo", site_footer_text: "Footer text", site_social: "Social links",
  // home
  home_headline: "Headline", home_sub: "Subheading", home_intro: "Introduction",
  home_image: "Featured image", home_cta: "Call-to-action links",
  // about
  about_headline: "Heading", about_body: "About text",
  about_image: "Photo", about_facts: "Facts & figures",
  // work
  work_headline: "Heading", work_intro: "Introduction", work_items: "Projects",
  // writing
  writing_headline: "Heading", writing_intro: "Introduction", writing_items: "Posts",
  // links
  links_headline: "Heading", links_intro: "Introduction", links_list: "Links",
  // gallery
  gallery_headline: "Heading", gallery_intro: "Introduction", gallery_items: "Images",
  // contact
  contact_headline: "Heading", contact_body: "Contact text",
  contact_methods: "Contact methods", contact_social: "Social links",
};

const SLOT_SOFT_LIMITS = {
  site_name: 40, site_tagline: 80, site_footer_text: 60,
  home_headline: 80, home_sub: 120,
  about_headline: 60, work_headline: 60, writing_headline: 60,
  links_headline: 60, gallery_headline: 60, contact_headline: 60,
};
const LONGTEXT_SOFT_LIMIT = 600; // chars

// Called from buildTextField's input handler to update the char-count badge
function updateCharCount(input, slotName) {
  const countEl = input.closest(".field") && input.closest(".field").querySelector(".char-count");
  if (!countEl) return;
  const len = (input.value || "").length;
  const limit = SLOT_SOFT_LIMITS[slotName];
  if (!limit) { countEl.textContent = `${len} chars`; countEl.classList.remove("over"); return; }
  countEl.textContent = `${len} / ${limit}`;
  countEl.classList.toggle("over", len > limit);
}

// ── Initial state ──────────────────────────────────────────────────────────
showEmptyState();
</script>
