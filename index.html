<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kagaz</title>
<style>
  :root {
    --chrome-bg: #fafaf8;
    --chrome-fg: #1c1815;
    --chrome-muted: #6b6b68;
    --chrome-line: #e5e5e2;
    --chrome-line-strong: #d4d4d0;
    --chrome-panel: #ffffff;
    --chrome-input: #ffffff;
    --chrome-soft: #f4f4f1;
    --chrome-warn: #fffbee;
    --chrome-warn-line: #f0e8c0;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--chrome-bg); color: var(--chrome-fg);
    -webkit-font-smoothing: antialiased;
    overflow: hidden; /* shell owns its own scroll regions */
  }

  /* ── Editor shell — Phase 2 chunk 2.1 ───────────────────────────────────── */
  /* The editor is a three-row grid: top bar, main two-col body, status footer */
  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
  }

  /* Top bar — brand on the left, combination summary in the middle, action
     buttons on the right. Always visible. */
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 18px; background: var(--chrome-panel);
    border-bottom: 1px solid var(--chrome-line);
    flex-wrap: wrap;
  }
  .brand-block { display: flex; align-items: baseline; gap: 8px; }
  .brand { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; margin: 0; }
  .brand-sub { font-size: 9px; color: var(--chrome-muted); letter-spacing: 1.5px; text-transform: uppercase; margin: 0; }
  .combo-line { display: flex; gap: 6px; flex: 1; min-width: 200px; flex-wrap: wrap; }
  .combo-pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 4px 9px; border-radius: 99px;
    background: var(--chrome-soft); color: var(--chrome-fg);
    border: 1px solid var(--chrome-line);
  }
  .combo-pill .pill-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--chrome-muted);
  }
  .topbar-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn {
    background: var(--chrome-fg); color: #fff; border: none;
    padding: 7px 13px; border-radius: 4px;
    font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer;
    line-height: 1.2;
  }
  .btn.secondary {
    background: transparent; color: var(--chrome-fg);
    border: 1px solid var(--chrome-line-strong);
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: wait; }

  /* Main body — two columns: form on the left, live preview on the right.
     Each column scrolls independently so the form can be tall and the preview
     stays anchored. */
  .main {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: 0;
    overflow: hidden;
  }
  .form-col {
    border-right: 1px solid var(--chrome-line);
    background: var(--chrome-panel);
    overflow-y: auto;
    padding: 18px 22px 32px;
  }
  .preview-col {
    background: var(--chrome-bg);
    overflow-y: auto;
    padding: 24px;
  }

  /* Page tab strip at the top of the form column. Chunk 2.1 shows the
     primary page only; multi-page tabs land in chunk 2.3. */
  .page-tabs {
    display: flex; gap: 4px;
    margin: -6px -2px 16px;
    flex-wrap: wrap;
  }
  .page-tab {
    background: none; border: 1px solid var(--chrome-line);
    padding: 5px 11px; border-radius: 4px;
    font-family: inherit; font-size: 11px; cursor: pointer;
    color: var(--chrome-muted);
  }
  .page-tab.active {
    background: var(--chrome-fg); color: #fff; border-color: var(--chrome-fg);
  }
  .page-tab:hover { color: var(--chrome-fg); }
  .page-tab.active:hover { color: #fff; }

  /* Form fields */
  .form-section-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--chrome-muted); font-weight: 700;
    margin: 18px 0 8px;
  }
  .form-section-label:first-of-type { margin-top: 0; }
  .field { margin-bottom: 14px; }
  .field-label {
    display: block; font-size: 11px; color: var(--chrome-muted);
    letter-spacing: 0.3px; margin-bottom: 4px;
  }
  .field-label code {
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 10px; opacity: 0.7;
  }
  .field input[type=text] {
    width: 100%; padding: 7px 10px;
    border: 1px solid var(--chrome-line); border-radius: 4px;
    font-family: inherit; font-size: 13px;
    background: var(--chrome-input); color: var(--chrome-fg);
  }
  .field input[type=text]:focus {
    outline: none; border-color: var(--chrome-fg);
  }
  .field-stub {
    font-size: 11px; color: var(--chrome-muted); font-style: italic;
    padding: 9px 10px; border: 1px dashed var(--chrome-line);
    border-radius: 4px; background: var(--chrome-soft);
  }
  .field-stub strong { font-style: normal; color: var(--chrome-fg); }

  /* Longtext editor — textarea with monospace + char count */
  .field textarea {
    width: 100%; padding: 9px 11px;
    border: 1px solid var(--chrome-line); border-radius: 4px;
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 12px; line-height: 1.55;
    background: var(--chrome-input); color: var(--chrome-fg);
    resize: vertical; min-height: 90px;
  }
  .field textarea:focus { outline: none; border-color: var(--chrome-fg); }
  .field-meta {
    display: flex; justify-content: space-between;
    margin-top: 4px;
    font-size: 9px; color: var(--chrome-muted);
    letter-spacing: 0.3px;
  }
  .field-meta .meta-hint { font-style: italic; }

  /* List editor — repeatable items with inline sub-fields */
  .list-editor {
    border: 1px solid var(--chrome-line); border-radius: 4px;
    background: var(--chrome-soft);
    padding: 4px;
  }
  .list-empty {
    padding: 14px;
    font-size: 11px; color: var(--chrome-muted);
    font-style: italic; text-align: center;
  }
  .list-item {
    background: var(--chrome-panel);
    border: 1px solid var(--chrome-line);
    border-radius: 3px;
    margin: 4px;
    padding: 9px 10px 6px 10px;
    position: relative;
  }
  .list-item-controls {
    display: flex; gap: 2px;
    position: absolute; top: 6px; right: 6px;
  }
  .list-item-controls button {
    background: none; border: 1px solid transparent;
    border-radius: 3px;
    width: 22px; height: 22px;
    font-size: 11px; line-height: 1;
    color: var(--chrome-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .list-item-controls button:hover {
    color: var(--chrome-fg); border-color: var(--chrome-line-strong); background: var(--chrome-soft);
  }
  .list-item-controls button:disabled { opacity: 0.3; cursor: not-allowed; }
  .list-item-controls .control-delete:hover {
    color: #c81018; border-color: #f4c4c0;
  }
  .list-item-index {
    position: absolute; top: 7px; left: 8px;
    font-size: 9px; color: var(--chrome-muted);
    font-family: ui-monospace, Menlo, monospace;
    letter-spacing: 0.5px;
  }
  .list-item-body {
    margin-top: 14px;
  }
  .sub-field { margin-bottom: 7px; }
  .sub-field:last-child { margin-bottom: 0; }
  .sub-field-label {
    display: block;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--chrome-muted); font-weight: 600;
    margin-bottom: 2px;
  }
  .sub-field input[type=text] {
    width: 100%; padding: 5px 8px;
    border: 1px solid var(--chrome-line); border-radius: 3px;
    font-family: inherit; font-size: 12px;
    background: var(--chrome-input); color: var(--chrome-fg);
  }
  .sub-field input[type=text]:focus { outline: none; border-color: var(--chrome-fg); }
  .sub-field select {
    width: 100%; padding: 5px 8px;
    border: 1px solid var(--chrome-line); border-radius: 3px;
    font-family: inherit; font-size: 12px;
    background: var(--chrome-input); color: var(--chrome-fg);
  }
  .sub-field select:focus { outline: none; border-color: var(--chrome-fg); }
  .sub-field-stub {
    font-size: 10px; color: var(--chrome-muted);
    padding: 5px 8px;
    border: 1px dashed var(--chrome-line); border-radius: 3px;
    background: var(--chrome-bg);
    font-style: italic;
  }
  .list-add {
    display: block; width: calc(100% - 8px);
    margin: 4px;
    background: transparent; color: var(--chrome-muted);
    border: 1px dashed var(--chrome-line-strong);
    border-radius: 3px;
    padding: 7px;
    font-family: inherit; font-size: 11px; cursor: pointer;
  }
  .list-add:hover {
    background: var(--chrome-panel); color: var(--chrome-fg);
    border-color: var(--chrome-fg); border-style: solid;
  }

  /* Links editor row — icon dot inline with the label */
  .link-icon-preview {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px;
    color: var(--chrome-fg);
    vertical-align: middle;
    margin-right: 4px;
  }
  .link-icon-preview svg { width: 14px; height: 14px; }
  .empty-state {
    padding: 60px 20px; text-align: center;
    font-size: 13px; color: var(--chrome-muted);
  }
  .empty-state .empty-title { font-size: 15px; color: var(--chrome-fg); margin-bottom: 6px; font-weight: 600; }

  /* Preview pane: a paper-like card with the rendered layout inside */
  .preview-frame {
    max-width: 960px; margin: 0 auto;
    background: #fff;
    border: 1px solid var(--chrome-line); border-radius: 6px;
    box-shadow: 0 2px 14px rgba(0, 0, 0, 0.04);
    overflow: hidden;
  }
  #preview { min-height: 600px; }
  #preview > div { /* the rendered layout */ display: block; }

  /* Status footer */
  .statusbar {
    padding: 7px 18px;
    background: var(--chrome-panel);
    border-top: 1px solid var(--chrome-line);
    font-size: 11px; color: var(--chrome-muted);
    font-family: ui-monospace, Menlo, Consolas, monospace;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* Narrow viewport */
  @media (max-width: 880px) {
    .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .form-col { border-right: none; border-bottom: 1px solid var(--chrome-line); max-height: 50vh; }
  }

  /* ── Chunk 2.4: Choose screen ───────────────────────────────────────────── */
  .choose-screen {
    grid-column: 1 / -1; /* spans both columns */
    overflow-y: auto;
    padding: 32px 40px 48px;
    background: var(--chrome-bg);
  }
  .choose-header {
    display: flex; align-items: baseline; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .choose-title { font-size: 15px; font-weight: 600; }
  .choose-title span { font-weight: 400; color: var(--chrome-muted); font-size: 12px; margin-left: 6px; }
  .choose-search {
    flex: 1; min-width: 180px; max-width: 280px;
    padding: 7px 11px; border: 1px solid var(--chrome-line); border-radius: 4px;
    font-family: inherit; font-size: 12px;
    background: var(--chrome-panel); color: var(--chrome-fg);
  }
  .choose-search:focus { outline: none; border-color: var(--chrome-fg); }
  .choose-filters { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .filter-pill {
    padding: 3px 9px; border-radius: 99px; border: 1px solid var(--chrome-line);
    font-size: 10px; cursor: pointer; background: none; font-family: inherit;
    color: var(--chrome-muted);
  }
  .filter-pill.active { background: var(--chrome-fg); color: #fff; border-color: var(--chrome-fg); }
  .filter-pill:hover:not(.active) { border-color: var(--chrome-line-strong); color: var(--chrome-fg); }

  .combo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }
  .combo-card {
    background: var(--chrome-panel);
    border: 1px solid var(--chrome-line); border-radius: 6px;
    overflow: hidden; cursor: pointer; position: relative;
    transition: box-shadow 0.1s, border-color 0.1s;
  }
  .combo-card:hover { border-color: var(--chrome-line-strong); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .combo-card:focus { outline: 2px solid var(--chrome-fg); outline-offset: 2px; }
  .combo-swatch {
    height: 56px; display: flex;
  }
  .combo-swatch-seg { flex: 1; }
  .combo-card-body { padding: 10px 11px 11px; }
  .combo-card-name { font-size: 13px; font-weight: 600; line-height: 1.2; margin-bottom: 3px; }
  .combo-card-sub { font-size: 10px; color: var(--chrome-muted); line-height: 1.4; }
  .combo-card-meta { display: flex; gap: 5px; margin-top: 7px; }
  .combo-card-pill {
    font-size: 9px; padding: 1px 6px; border-radius: 99px;
    border: 1px solid var(--chrome-line); color: var(--chrome-muted);
    background: var(--chrome-soft); letter-spacing: 0.2px;
  }

  /* ── Phase 3: Choose screen header actions ──────────────────────────────── */
  .choose-header-actions {
    display: flex; align-items: center; gap: 8px; margin-left: auto;
  }
  .choose-skip {
    font-size: 11px; color: var(--chrome-muted); background: none;
    border: none; cursor: pointer; font-family: inherit; padding: 3px 6px;
    border-radius: 3px; white-space: nowrap;
  }
  .choose-skip:hover { color: var(--chrome-fg); }
  .choose-open-btn {
    font-size: 11px; padding: 4px 10px; border-radius: 4px;
    border: 1px solid var(--chrome-line); background: var(--chrome-panel);
    color: var(--chrome-fg); cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .choose-open-btn:hover { border-color: var(--chrome-line-strong); }

  /* ── Phase 3: Layout story ⓘ button on combo cards ─────────────────────── */
  .combo-card-info {
    position: absolute; top: 5px; right: 5px;
    width: 18px; height: 18px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4); background: rgba(0,0,0,0.18);
    color: #fff; font-size: 10px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: inherit; line-height: 1; opacity: 0;
    transition: opacity 0.12s;
  }
  .combo-card:hover .combo-card-info,
  .combo-card:focus .combo-card-info { opacity: 1; }

  /* ── Phase 3: Story modal ───────────────────────────────────────────────── */
  .story-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 3000; display: flex; align-items: center; justify-content: center;
  }
  .story-modal-box {
    background: var(--chrome-bg); border: 1px solid var(--chrome-line);
    border-radius: 8px; padding: 28px 32px 24px;
    max-width: 480px; width: calc(100% - 40px); max-height: 80vh; overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    position: relative;
  }
  .story-modal-title {
    font-size: 16px; font-weight: 700; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .story-modal-body { font-size: 13px; line-height: 1.65; color: var(--chrome-fg); }
  .story-modal-body p { margin: 0 0 12px; }
  .story-modal-body p:last-child { margin-bottom: 0; }
  .story-modal-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: var(--chrome-muted); line-height: 1;
    padding: 2px 6px; border-radius: 3px;
  }
  .story-modal-close:hover { color: var(--chrome-fg); }

  /* ── Chunk 2.4: Restore toast ───────────────────────────────────────────── */
  .restore-toast {
    position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%);
    background: var(--chrome-fg); color: #fff;
    padding: 11px 18px; border-radius: 6px;
    font-size: 12px; line-height: 1.4;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    display: flex; align-items: center; gap: 12px;
    z-index: 2000; white-space: nowrap;
  }
  .restore-toast button {
    background: #fff; color: var(--chrome-fg);
    border: none; border-radius: 3px; padding: 4px 10px;
    font-family: inherit; font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .restore-toast .toast-dismiss {
    background: transparent; color: rgba(255,255,255,0.6); font-weight: 400; padding: 0;
  }
  .restore-toast .toast-dismiss:hover { color: #fff; }

  /* ── Chunk 2.4: length hint overflow ────────────────────────────────────── */
  .field-meta .char-count.over { color: #c87800; font-weight: 600; }

  /* ── Chunk 2.3 additions ───────────────────────────────────────────────── */

  /* Combo pills — now interactive buttons */
  .combo-pill {
    background: none; cursor: pointer;
    font-family: inherit; text-align: left;
  }
  .combo-pill:hover { background: var(--chrome-bg); border-color: var(--chrome-line-strong); }

  /* Page tab × remove button (inside the tab button) */
  .page-tab-remove {
    background: none; border: none;
    font-size: 11px; color: inherit; opacity: 0.55;
    cursor: pointer; padding: 0 0 0 5px; line-height: 1;
    vertical-align: middle; font-family: inherit;
  }
  .page-tab-remove:hover { opacity: 1; color: #c81018; }
  /* + add page button */
  .page-tab-add {
    background: none; border: 1px dashed var(--chrome-line-strong);
    padding: 5px 9px; border-radius: 4px;
    font-family: inherit; font-size: 11px; cursor: pointer;
    color: var(--chrome-muted);
  }
  .page-tab-add:hover { color: var(--chrome-fg); border-color: var(--chrome-fg); border-style: solid; }

  /* Picker overlay — reused for layout / palette / typography pickers */
  .picker-overlay {
    position: fixed; z-index: 1000;
    background: var(--chrome-panel);
    border: 1px solid var(--chrome-line-strong);
    border-radius: 6px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.13);
    max-height: 380px;
    overflow-y: auto;
    min-width: 260px;
    max-width: 420px;
    display: none;
  }
  .picker-header {
    padding: 10px 12px 6px;
    border-bottom: 1px solid var(--chrome-line);
    position: sticky; top: 0;
    background: var(--chrome-panel); z-index: 1;
  }
  .picker-search {
    width: 100%; padding: 6px 9px;
    border: 1px solid var(--chrome-line); border-radius: 4px;
    font-family: inherit; font-size: 12px;
    background: var(--chrome-input); color: var(--chrome-fg);
  }
  .picker-search:focus { outline: none; border-color: var(--chrome-fg); }
  .picker-list { padding: 4px 0; }
  .picker-item {
    padding: 7px 14px; cursor: pointer;
    font-size: 12px; line-height: 1.35;
  }
  .picker-item:hover { background: var(--chrome-soft); }
  .picker-item.active { background: var(--chrome-fg); color: #fff; }
  .picker-item-name { font-weight: 500; }
  .picker-item-sub { font-size: 10px; opacity: 0.6; margin-top: 1px; }
  .picker-group-label {
    padding: 10px 14px 3px;
    font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--chrome-muted); font-weight: 700;
  }
  .picker-swatch {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 4px; vertical-align: middle;
    border: 1px solid rgba(0,0,0,0.1);
  }

  /* Add-page popover */
  .add-page-popover {
    position: fixed; z-index: 1001;
    background: var(--chrome-panel);
    border: 1px solid var(--chrome-line-strong);
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    min-width: 150px;
    display: none;
  }
  .add-page-item {
    padding: 8px 14px; font-size: 12px; cursor: pointer;
    display: block; width: 100%; background: none; border: none;
    font-family: inherit; color: var(--chrome-fg); text-align: left;
    border-radius: 0;
  }
  .add-page-item:hover { background: var(--chrome-soft); }
  .add-page-empty { padding: 10px 14px; font-size: 11px; color: var(--chrome-muted); font-style: italic; }

  /* Image field — drop zone + thumbnail */
  .drop-zone {
    border: 2px dashed var(--chrome-line-strong); border-radius: 5px;
    padding: 18px 12px; text-align: center; cursor: pointer;
    font-size: 11px; color: var(--chrome-muted);
    background: var(--chrome-soft);
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--chrome-fg); color: var(--chrome-fg); background: var(--chrome-bg);
  }
  .image-preview-wrap {
    border: 1px solid var(--chrome-line); border-radius: 4px;
    padding: 8px; background: var(--chrome-soft);
    margin-bottom: 5px;
    display: flex; align-items: center; gap: 8px;
  }
  .image-preview-wrap img { max-width: 72px; max-height: 54px; border-radius: 2px; object-fit: cover; display: block; }
  .image-info { font-size: 10px; color: var(--chrome-muted); line-height: 1.4; }
  .image-field-alt {
    width: 100%; padding: 5px 8px;
    border: 1px solid var(--chrome-line); border-radius: 3px;
    font-family: inherit; font-size: 11px;
    background: var(--chrome-input); color: var(--chrome-fg);
    margin-top: 4px;
  }
  .image-field-alt:focus { outline: none; border-color: var(--chrome-fg); }
  .image-remove-btn {
    background: none; border: 1px solid var(--chrome-line);
    border-radius: 3px; padding: 3px 7px;
    font-family: inherit; font-size: 10px;
    color: var(--chrome-muted); cursor: pointer; margin-top: 4px;
  }
  .image-remove-btn:hover { color: #c81018; border-color: #f4c4c0; }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand-block">
      <h1 class="brand">Kagaz</h1>
      <p class="brand-sub">काग़ज़ · paper</p>
    </div>
    <div class="combo-line" id="comboLine">
      <!-- pills rendered by renderComboLine() -->
    </div>
    <div class="topbar-actions">

const LAYOUT_STORIES = {
  monolith: "<p>For the person with one thing to say. A writer between books, a designer between projects, someone announcing a sabbatical or a launch. The page <em>is</em> the statement — nothing else competes with it.</p><p>Big type carries authority. Best paired with the cleanest palettes (MUJI, BAIZI, CHUNA) to let the words breathe, or with the most severe (SUMI, KAJAL, KARI) when the authority needs gravity.</p>",

  atelier: "<p>For the maker who wants identity and output visible together. The two-column structure lets you say who you are while showing what you've made, in the same eyeful.</p><p>The editorial typography signals 'I am a craftsperson, this is my workshop.' Best for architects, designers, small studios, anyone whose practice is the brand.</p>",

  index: "<p>For the prolific. The site is a list of things you've made or written, and the structure stays out of the way. Inspired by Simon Willison's blog, by 90s academic homepages, by anyone whose value is the volume and quality of their archive.</p><p>Sparse decoration on purpose — the work IS the design.</p>",

  card: "<p>For the creator whose site is a router. Musicians, podcasters, influencers, anyone whose visitors arrive looking to be sent somewhere else. Mobile-first, vertically stacked, big tap targets.</p><p>The taste comes from pairing the linktree pattern with a real palette and real typography instead of generic SaaS chrome.</p>",

  salon: "<p>For the public figure who needs the full set: a proper homepage, navigation, multiple sections, a real 'house on the internet'. Conservative structure on purpose — it's the layout that doesn't surprise visitors.</p><p>Best for academics, public intellectuals, founders, anyone whose audience expects a conventional personal site.</p>",

  split: "<p>For the visual professional. The image side shows the work — a portfolio shot, a self-portrait, a piece of identity. The text side carries the words.</p><p>The 50/50 split refuses to let either dominate, which is the point: visual people whose words also matter. Photographers, designers, illustrators, art directors.</p>",

  marquee: "<p>For the person whose site is itself a piece of design. Type-as-art. The name fills the page because the page <em>is</em> the brand.</p><p>Best for designers and design-adjacent professionals who want their site to demonstrate, not describe, their taste. Pairs hardest with the boldest palettes — HALDI, ZHUSHA, KAALI.</p>",

  tile: "<p>For visual portfolios where the work is image-based. Inspired by Instagram grids, contact sheets, gallery wall arrangements.</p><p>The grid is unforgiving — every tile competes with every other — which forces curation. Best for photographers, illustrators, designers with a body of visual work. When images are missing, the tiles fall back to palette colors so empty states look composed on purpose.</p>",

  dossier: "<p>For the formal context. Looks like a printed CV or a gallery handout. The user is signaling 'I am serious, I want to be evaluated on substance.'</p><p>Best for academics, consultants, lawyers, anyone whose professional context expects a document-shaped artifact.</p>",

  terminal: "<p>For developers, hackers, sysadmins, anyone whose identity is wrapped up in the command line. In dark palettes (URUSHI, QIQI, KAALI) it reads as a real terminal session. In light palettes (KINARI, KHADI) it reads as a typewritten code listing.</p><p>Either way, the message is 'I am of the machine.'</p>",

  frame: "<p>For the artist with a single piece to present. The matted border treats the content like a print on a wall — bordered, framed, presented.</p><p>Best when there's exactly one thing to show: an announcement, a project launch, a personal statement, a gallery opening.</p>",

  letter: "<p>For intimacy. Writers, essayists, anyone whose relationship with their visitors is personal rather than professional.</p><p>The format borrows from physical correspondence — date, salutation, body, signature — to make a website feel like an actual address from one person to another. Pairs naturally with the warmer palettes (KINARI, KHADI, MIZHI, CHANDANA).</p>",

  newspaper: "<p>For journalists, editors, publishers, anyone whose work is editorial in shape. The masthead carries authority; the column grid implies a publication, not a person.</p><p>Best when you want the site to feel like an institution you edit, even if the institution is just you.</p>",

  poster: "<p>For musicians, event organizers, performers, gig promoters. The hierarchy mirrors a printed gig poster: enormous name, list of dates or projects, dotted leader lines.</p><p>The user is announcing themselves as a presence with shows to attend, even if the 'shows' are projects.</p>",

  manifesto: "<p>For the opinionated. Founders explaining their thesis, activists making a case, writers staking ground. The long-form single page treats the visitor as someone who came to read, not browse.</p><p>The pull quote breaks the wall of text and lets you front-load the most quotable line. Pairs with the serious palettes (SUMI, KAJAL, KARI, NEEL).</p>",
};

function detectIcon(url) {
  if (!url) return "link";
  const u = url.toLowerCase();
  for (const { id, patterns } of SLOT_DEFS.iconPatterns) {
    for (const p of patterns) {
      if (u.includes(p)) return id;
    }
  }
  return "link";
}

// -----------------------------------------------------------------------------
// Content helpers — every user-content interpolation MUST flow through these.
// -----------------------------------------------------------------------------
// esc(s)      — HTML-escape a string for safe text interpolation
// md(s)       — Phase 1 minimal markdown: escape + paragraph-wrap (for longtext)
//               TODO(phase-2): replace with marked.js when Tiptap is wired
// safeUrl(u)  — reject javascript:/data:/vbscript: schemes, escape for href/src
// imgUrl(ref) — resolve {asset, alt} image ref → blob URL via current assetMap
// icon(id)    — return inline SVG string for one of the 14 baked-in icons
const ESC_MAP = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" };
function esc(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ESC_MAP[c]);
}
function md(s) {
  if (s == null) return "";
  const text = String(s).trim();
  if (!text) return "";
  return text.split(/\n\s*\n/).map(p => `<p>${esc(p).replace(/\n/g, "<br>")}</p>`).join("");
}
function safeUrl(u) {
  if (u == null) return "#";
  const s = String(u).trim();
  if (!s) return "#";
  if (/^(javascript|data|vbscript):/i.test(s)) return "#";
  return esc(s);
}
let __ASSET_MAP = null; // set by the render entry point; reset per render call
function imgUrl(ref) {
  if (!ref || !ref.asset || !__ASSET_MAP) return null;
  const entry = __ASSET_MAP.get(ref.asset);
  return entry ? entry.url : null;
}
function icon(id) {
  return ICONS[id] || ICONS.link;
}

// ── Shared nav bar for layouts that include persistent navigation ────────────
// Reads c.exportedPageIds (export mode) or c.pageOrder (editor mode).
// activePid is highlighted in BRAND colour + bold.
function _buildNav(c, p, activePid) {
  const s = c.site || {};
  const pages = c.exportedPageIds || c.pageOrder || ["home"];
  const links = pages.map(pid => {
    const href = pid === "home" ? "index.html" : pid + ".html";
    const label = pid.charAt(0).toUpperCase() + pid.slice(1);
    const isActive = pid === activePid;
    return `<a href="${esc(href)}" style="color:${isActive ? p.BRAND : p.INK};text-decoration:none;font-weight:${isActive ? "600" : "400"};opacity:${isActive ? "1" : "0.75"};">${esc(label)}</a>`;
  }).join("");
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;padding:24px 48px;border-bottom:0.5px solid ${p.ROW};">
    <a href="index.html" style="font-size:14px;font-weight:600;color:${p.INK};text-decoration:none;">${esc(s.site_name)}</a>
    <div style="display:flex;gap:24px;font-size:13px;">${links}</div>
  </div>`;
}

// -----------------------------------------------------------------------------
// 9. FILE_FORMAT — .kagaz zip load/save + static site export
// -----------------------------------------------------------------------------
// A .kagaz file is a zip containing:
//   project.json   — flat slot-keyed project data (see specs/file-format.md)
//   assets/        — one file per referenced image asset, named {id}.{ext}
//
// loadKagazFile:  File      → project (with assetMap of blob URLs)
// saveKagazFile:  project   → Blob   (drops orphan assets)
// exportSite:     project   → Blob   (renders HTML + copies assets + drops source)

// JSZip is lazy-loaded from CDN the first time any file op is called.
// Cached as a promise so repeated calls reuse the one fetch.
let __JSZipPromise = null;
function loadJSZip() {
  if (!__JSZipPromise) {
    __JSZipPromise = import("https://cdn.jsdelivr.net/npm/jszip@3/+esm")
      .then(mod => mod.default || mod.JSZip || mod)
      .catch(err => {
        __JSZipPromise = null; // allow retry
        throw new Error("Failed to load JSZip from CDN: " + err.message);
      });
  }
  return __JSZipPromise;
}

// Walk a project, collect every referenced asset id from image / list / site
// slots. Used by save (drop orphans) and export (copy to site/assets/).
function collectAssetRefs(project) {
  const refs = new Set();
  const visit = (v) => {
    if (v == null || typeof v !== "object") return;
    if (Array.isArray(v)) { v.forEach(visit); return; }
    if (typeof v.asset === "string") { refs.add(v.asset); return; }
    for (const k in v) visit(v[k]);
  };
  visit(project.site);
  visit(project.pages);
  return refs;
}

// Serialize a project to JSON, stripping runtime-only fields (assetMap).
function projectToJson(project) {
  const { assetMap, ...serializable } = project;
  return JSON.stringify(serializable, null, 2);
}

// Turn a file extension into a mime type for Blob reconstruction on load.
function mimeFromExt(ext) {
  return {
    jpg: "image/jpeg", jpeg: "image/jpeg", png: "image/png",
    gif: "image/gif", webp: "image/webp", svg: "image/svg+xml"
  }[String(ext).toLowerCase()] || "";
}

// Load a .kagaz file. Returns a project with assetMap (Map<id, {url, blob, mime, ext}>).
// Throws on malformed zips, missing project.json, or future kagazVersion.
async function loadKagazFile(file) {
  const JSZip = await loadJSZip();
  const zip = await JSZip.loadAsync(file);

  const projectEntry = zip.file("project.json");
  if (!projectEntry) throw new Error("Not a valid .kagaz file: missing project.json");

  let project;
  try {
    project = JSON.parse(await projectEntry.async("string"));
  } catch (e) {
    throw new Error("project.json is not valid JSON: " + e.message);
  }

  // Version gate per specs/file-format.md §Versioning
  const v = project.kagazVersion;
  if (v == null) throw new Error("project.json: missing kagazVersion");
  if (v > 1) throw new Error(`This file was made with Kagaz v${v}. Please update Kagaz.`);
  // v < 1 would run forward migrations; v1 has no prior.

  // Build asset map — one blob URL per file under assets/
  const assetMap = new Map();
  const assetFolder = zip.folder("assets");
  if (assetFolder) {
    const tasks = [];
    assetFolder.forEach((relativePath, zipFile) => {
      if (zipFile.dir) return;
      const m = relativePath.match(/^(img-[\w-]+)\.([a-z0-9]+)$/i);
      if (!m) return; // unknown filename shape, skip
      const [, id, ext] = m;
      tasks.push(
        zipFile.async("blob").then(rawBlob => {
          const mime = rawBlob.type || mimeFromExt(ext);
          const blob = mime ? new Blob([rawBlob], { type: mime }) : rawBlob;
          assetMap.set(id, { url: URL.createObjectURL(blob), blob, mime, ext });
        })
      );
    });
    await Promise.all(tasks);
  }
  project.assetMap = assetMap;
  return project;
}

// Save a project to a .kagaz Blob.
// - Updates updatedAt to now
// - Drops orphan assets (present in assetMap but not referenced in content)
// - Only referenced assets are written to the output zip
async function saveKagazFile(project) {
  const JSZip = await loadJSZip();
  const zip = new JSZip();

  const snapshot = {
    ...project,
    updatedAt: new Date().toISOString(),
  };
  // assetMap is runtime-only; projectToJson strips it
  zip.file("project.json", projectToJson(snapshot));

  const refs = collectAssetRefs(project);
  if (project.assetMap && refs.size > 0) {
    const assetFolder = zip.folder("assets");
    for (const id of refs) {
      const entry = project.assetMap.get(id);
      if (!entry) continue; // content references an asset that isn't in memory; skip silently
      const ext = entry.ext || "bin";
      assetFolder.file(`${id}.${ext}`, entry.blob);
    }
  }

  return zip.generateAsync({ type: "blob" });
}

// Build the per-page HTML shell. Inlines palette CSS vars + typography CSS
// vars, emits meta/OG tags, favicon link if present. Every user-string
// interpolation goes through esc() — title/description include user content.
function buildHtmlShell({ title, description, faviconPath, palette, typography, body }) {
  const p = palette.slots;
  const t = esc(title);
  const d = esc(description);
  const faviconTag = faviconPath ? `\n<link rel="icon" type="image/png" href="${esc(faviconPath)}">` : "";
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${t}</title>
<meta name="description" content="${d}">
<meta property="og:title" content="${t}">
<meta property="og:description" content="${d}">
<meta property="og:type" content="website">${faviconTag}
<style>
  :root {
    --kg-display: ${typography.display};
    --kg-body: ${typography.body};
    --kg-mono: ${typography.mono};
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: ${p.BODY};
    color: ${p.INK};
    font-family: var(--kg-body);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: inherit; }
</style>
</head>
<body>
${body}
</body>
</html>`;
}

// Generate a 32x32 PNG favicon from the site_avatar image ref.
// Browsers accept PNG bytes written as favicon.png via <link rel="icon">.
// Returns a Blob, or null if no avatar is set / decode fails.
async function generateFavicon(avatarRef, assetMap) {
  if (!avatarRef || !avatarRef.asset || !assetMap) return null;
  const entry = assetMap.get(avatarRef.asset);
  if (!entry) return null;

  const img = new Image();
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = () => reject(new Error("Failed to decode avatar for favicon"));
    img.src = entry.url;
  });

  const canvas = document.createElement("canvas");
  canvas.width = 32;
  canvas.height = 32;
  const ctx = canvas.getContext("2d");
  // Center-crop to square, then scale to 32x32
  const w = img.naturalWidth || img.width;
  const h = img.naturalHeight || img.height;
  const s = Math.min(w, h);
  const sx = (w - s) / 2;
  const sy = (h - s) / 2;
  ctx.drawImage(img, sx, sy, s, s, 0, 0, 32, 32);

  return new Promise((resolve, reject) => {
    canvas.toBlob(
      blob => blob ? resolve(blob) : reject(new Error("favicon toBlob returned null")),
      "image/png"
    );
  });
}

// Export a project as a deployable static site zip.
// Pipeline per specs/file-format.md §Export sequence + specs/v1-spec.md §12:
//   1. Validate combination (layout / palette / typography all exist)
//   2. Determine exportable pages: pageOrder ∩ layout.supportedPages ∩ has-render
//   3. Build an "export-mode" project whose asset URLs resolve to deployment
//      paths (assets/{id}.{ext}) instead of blob: URLs
//   4. Generate favicon from site_avatar if present
//   5. Render each exported page, wrap in HTML shell, write to zip root
//   6. Copy referenced assets into assets/ (orphans dropped)
//   7. Drop source.kagaz alongside so the user always has both artifacts
async function exportSite(project) {
  const JSZip = await loadJSZip();
  const zip = new JSZip();

  // 1. Validate combination
  const combo = project.combination || {};
  const layout = LAYOUTS.find(L => L.id === combo.layoutId);
  if (!layout) throw new Error("Unknown layout: " + combo.layoutId);
  const palette = PALETTES.find(p => p.id === combo.paletteId);
  if (!palette) throw new Error("Unknown palette: " + combo.paletteId);
  const typography = TYPOGRAPHIES.find(t => t.id === combo.typographyId);
  if (!typography) throw new Error("Unknown typography: " + combo.typographyId);

  // 2. Which pages are actually exportable
  const supported = SLOT_DEFS.layoutPages[layout.id] || [];
  const pageOrder = project.pageOrder || [];
  let exportedPageIds = pageOrder.filter(pid => supported.includes(pid) && layout.pages[pid]);
  if (exportedPageIds.length === 0) {
    // Fallback: any supported page with a render, primary first
    const primary = supported.find(pid => layout.pages[pid]);
    if (!primary) throw new Error(`Layout ${layout.id} has no renderable pages`);
    exportedPageIds = [primary];
  }

  // 3. Export-mode project: asset URLs swapped to deployment paths
  const exportAssetMap = new Map();
  if (project.assetMap) {
    for (const [id, entry] of project.assetMap) {
      exportAssetMap.set(id, { ...entry, url: `assets/${id}.${entry.ext || "bin"}` });
    }
  }
  const exportProject = {
    ...project,
    assetMap: exportAssetMap,
    exportedPageIds, // layouts that render nav read this via content
  };

  // 4. Favicon
  let faviconPath = null;
  try {
    const fav = await generateFavicon(project.site && project.site.site_avatar, project.assetMap);
    if (fav) {
      zip.file("favicon.png", fav);
      faviconPath = "favicon.png";
    }
  } catch (err) {
    console.warn("Favicon generation failed, skipping:", err);
  }

  // 5. Render each page
  const site = project.site || {};
  const homePage = (project.pages && project.pages.home) || {};
  const title = site.site_name || "Untitled";
  const description = site.site_tagline || homePage.home_sub || "";

  const savedMap = __ASSET_MAP;
  __ASSET_MAP = exportAssetMap;
  try {
    for (const pid of exportedPageIds) {
      const content = buildPageContent(exportProject, pid);
      content.exportedPageIds = exportedPageIds;
      const body = layout.pages[pid](content, palette.slots);
      const html = buildHtmlShell({ title, description, faviconPath, palette, typography, body });
      const filename = pid === "home" ? "index.html" : `${pid}.html`;
      zip.file(filename, html);
    }
  } finally {
    __ASSET_MAP = savedMap;
  }

  // 6. Copy referenced assets (orphans dropped)
  const refs = collectAssetRefs(project);
  if (project.assetMap && refs.size > 0) {
    const assetFolder = zip.folder("assets");
    for (const id of refs) {
      const entry = project.assetMap.get(id);
      if (!entry) continue;
      assetFolder.file(`${id}.${entry.ext || "bin"}`, entry.blob);
    }
  }

  // 7. Embed source.kagaz alongside
  try {
    const sourceBlob = await saveKagazFile(project);
    zip.file("source.kagaz", sourceBlob);
  } catch (err) {
    console.warn("Failed to embed source.kagaz:", err);
  }

  return zip.generateAsync({ type: "blob" });
}

// ----- Small browser utilities used by the button wiring -----
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function slugify(s) {
  return String(s || "untitled").toLowerCase().trim()
    .replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "untitled";
}

async function withLoadingState(btn, label, fn) {
  const orig = btn.textContent;
  btn.textContent = label;
  btn.disabled = true;
  try { return await fn(); }
  finally { btn.textContent = orig; btn.disabled = false; }
}

// -----------------------------------------------------------------------------
// Render entry point — builds the per-page content view and calls the layout.
// -----------------------------------------------------------------------------
function buildPageContent(project, pageId) {
  return {
    site: project.site || {},
    page: (project.pages || {})[pageId] || {},
    pageId,
    pageOrder: project.pageOrder || [pageId],
    allPages: project.pages || {}, // Phase 1: layouts that surface multiple pages
                                    // on the home render read sibling pages here.
    assetMap: project.assetMap || null,
  };
}

function renderPage(project, layoutId, pageId, paletteId, typographyId) {
  const layout = LAYOUTS.find(L => L.id === layoutId);
  if (!layout) throw new Error("Unknown layout: " + layoutId);
  const pageRender = layout.pages[pageId];
  if (!pageRender) throw new Error(`Layout ${layoutId} has no render for page ${pageId}`);
  const palette = PALETTES.find(p => p.id === paletteId);
  if (!palette) throw new Error("Unknown palette: " + paletteId);
  const typography = TYPOGRAPHIES.find(t => t.id === typographyId);
  if (!typography) throw new Error("Unknown typography: " + typographyId);
  __ASSET_MAP = project.assetMap || null;
  const content = buildPageContent(project, pageId);
  const body = pageRender(content, palette.slots);
  // Wrap in a host div that sets the typography CSS vars
  return `<div style="--kg-display:${typography.display};--kg-body:${typography.body};--kg-mono:${typography.mono};">${body}</div>`;
}

//   DOM               — the form inputs (read on every change), the preview pane
//
// Mutation flow:  input change → setSlotValue() → re-render preview + status
// Load flow:      Load demo / Open → __currentProject set → renderEditor()
// Save flow:      saveKagazFile(__currentProject) → download (unchanged from Phase 1)
//
// Out of scope for chunk 2.1 (placeholders shown for these slot types):
//   longtext  → Tiptap (chunk 2.2)
//   list      → repeatable item editor (chunk 2.2)
//   links     → links editor (chunk 2.2)

const $ = (sel) => document.querySelector(sel);
const setStatus = (msg) => { $("#status").textContent = msg; };

let __currentProject = null;

// ── Render entry: rebuilds the entire editor (top combo line, page tabs,
//    form, preview) from __currentProject. Called whenever the project is
//    loaded or replaced wholesale. For incremental edits use mutateProjectField().
function renderEditor(note) {
  if (!__currentProject) {
    showEmptyState();
    return;
  }
  // Always dismiss the choose screen when entering the editor
  _exitChooseScreen();
  const combo = __currentProject.combination || {};
  const layout = LAYOUTS.find(L => L.id === combo.layoutId);
  if (!layout) {
    setStatus("ERROR: unknown layout " + combo.layoutId);
    return;
  }
  const supportedPages = SLOT_DEFS.layoutPages[layout.id] || [];
  if (!supportedPages.length) {
    setStatus("ERROR: layout " + layout.id + " has no supported pages");
    return;
  }
  // Default the active page to the layout's primary if the previous one isn't
  // supported by this layout (e.g. after switching layouts in chunk 2.3).
  if (!__currentPageId || !supportedPages.includes(__currentPageId)) {
    __currentPageId = supportedPages[0];
  }
  renderComboLine(combo, layout);
  renderPageTabs(layout, supportedPages);
  renderForm(layout);
  renderPreview();
  if (note) setStatus(note);
  else setStatusFromProject(layout, combo);
}

function renderComboCards(query) {
  const grid = document.getElementById("comboGrid");
  if (!grid) return;
  const q = query.toLowerCase().trim();
  const filtered = COMBINATIONS.filter(c => {
    if (__activeFilter !== "all" && c.layout !== __activeFilter) return false;
    if (!q) return true;
    return c.name.toLowerCase().includes(q) || c.sub.toLowerCase().includes(q) ||
           c.layout.includes(q) || c.typography.includes(q);
  });
  grid.innerHTML = "";
  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:48px;text-align:center;font-size:13px;color:var(--chrome-muted);">No combinations match "${esc(query)}"</div>`;
    return;
  }
  for (const combo of filtered) {
    const pal = PALETTES.find(p => p.id === combo.palette);
    const layout = LAYOUTS.find(L => L.id === combo.layout);
    const typo = TYPOGRAPHIES.find(t => t.id === combo.typography);
    const s = pal ? pal.slots : {};
    const card = document.createElement("div");
    card.className = "combo-card";
    card.setAttribute("tabindex", "0");
    card.setAttribute("role", "button");
    card.setAttribute("aria-label", `${combo.name}: ${combo.sub}`);
    card.innerHTML = `
      <div class="combo-swatch">
        <div class="combo-swatch-seg" style="background:${esc(s.BODY||"#eee")};"></div>
        <div class="combo-swatch-seg" style="background:${esc(s.BRAND||"#888")};"></div>
        <div class="combo-swatch-seg" style="background:${esc(s.ACT||"#444")};"></div>
        <div class="combo-swatch-seg" style="background:${esc(s.INK||"#222")};"></div>
        ${LAYOUT_STORIES[combo.layout] ? `<button class="combo-card-info" title="About this layout" aria-label="About the ${esc(layout ? layout.name : combo.layout)} layout">i</button>` : ""}
      </div>
      <div class="combo-card-body">
        <div class="combo-card-name">${esc(combo.name)}</div>
        <div class="combo-card-sub">${esc(combo.sub)}</div>
        <div class="combo-card-meta">
          <span class="combo-card-pill">${esc(layout ? layout.name : combo.layout)}</span>
          <span class="combo-card-pill">${esc(typo ? typo.name : combo.typography)}</span>
        </div>
      </div>`;
    const pick = () => startNewProject(combo);
    card.addEventListener("click", e => {
      if (e.target.classList.contains("combo-card-info")) {
        e.stopPropagation();
        showStoryModal(combo.layout, layout ? layout.name : combo.layout);
        return;
      }
      pick();
    });
    card.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pick(); } });
    grid.appendChild(card);
  }
}

    kagazVersion: 1,
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    combination: {
      layoutId: combo.layout,
      paletteId: combo.palette,
      typographyId: combo.typography,
    },
    site: { site_name: "", site_tagline: "", site_avatar: null, site_footer_text: "", site_social: [] },
    pageOrder: [primaryPage],

function _exitChooseScreen() {
  const screen = document.getElementById("chooseScreen");
  if (screen) screen.remove();
  const main = document.querySelector(".main");
  main.style.display = "";
  $("#formCol").style.display = "";
  document.querySelector(".preview-col").style.display = "";
}

function showStoryModal(layoutId, layoutName) {
  const story = LAYOUT_STORIES[layoutId];
  if (!story) return;
  const overlay = document.createElement("div");
  overlay.className = "story-modal-overlay";
  overlay.innerHTML = `
    <div class="story-modal-box" role="dialog" aria-modal="true" aria-label="${esc(layoutName)} layout story">
      <button class="story-modal-close" aria-label="Close">×</button>
      <div class="story-modal-title">${esc(layoutName)}</div>
      <div class="story-modal-body">${story}</div>
    </div>`;
  const close = () => { overlay.remove(); document.removeEventListener("keydown", onKey); };
  const onKey = e => { if (e.key === "Escape") close(); };
  overlay.querySelector(".story-modal-close").addEventListener("click", close);
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
  document.addEventListener("keydown", onKey);
  document.body.appendChild(overlay);
  overlay.querySelector(".story-modal-box").focus && overlay.querySelector(".story-modal-box").focus();
}

function showEmptyState() {
  // In chunk 2.4, "empty state" IS the choose screen
  __activeFilter = "all";
  showChooseState();
}

function setStatusFromProject(layout, combo) {
  const name = (__currentProject.site && __currentProject.site.site_name) || "Untitled";
  setStatus(`${esc(name)} · ${layout.name} · ${combo.paletteId} · ${combo.typographyId} · editing ${__currentPageId}`);
}

// ── Combination line in the top bar — three pills (Layout / Palette / Typography).
//    Click handlers for the pills land in chunk 2.3 (axis pickers).
// ── Combination line — clickable pills that open axis pickers (chunk 2.3) ────
function renderComboLine(combo, layout) {
  const palette = PALETTES.find(p => p.id === combo.paletteId);
  const typography = TYPOGRAPHIES.find(t => t.id === combo.typographyId);
  const paletteName = palette ? palette.name.replace(/^\d+ · /, "").replace(/ \[.*$/, "") : combo.paletteId;
  const typoName = typography ? typography.name : combo.typographyId;
  $("#comboLine").innerHTML = `
    <button class="combo-pill" id="pillLayout" title="Change layout"><span class="pill-label">Layout</span> ${esc(layout.name)}</button>
    <button class="combo-pill" id="pillPalette" title="Change palette"><span class="pill-label">Palette</span> ${esc(paletteName)}</button>
    <button class="combo-pill" id="pillType" title="Change typography"><span class="pill-label">Type</span> ${esc(typoName)}</button>
  `;
  $("#pillLayout").addEventListener("click", e => { e.stopPropagation(); openLayoutPicker(e.currentTarget); });
  $("#pillPalette").addEventListener("click", e => { e.stopPropagation(); openPalettePicker(e.currentTarget); });
  $("#pillType").addEventListener("click", e => { e.stopPropagation(); openTypoPicker(e.currentTarget); });
}

// ── Axis picker shared helpers ───────────────────────────────────────────────
function closeAllPickers() {
  const o = document.getElementById("pickerOverlay");
  if (o) o.style.display = "none";
  const p = document.getElementById("addPagePopover");
  if (p) p.style.display = "none";
}

function _openPickerAt(anchorEl) {
  const overlay = document.getElementById("pickerOverlay");
  const rect = anchorEl.getBoundingClientRect();
  const top = rect.bottom + 4;
  const left = Math.max(8, Math.min(rect.left, window.innerWidth - 430));
  overlay.style.top = top + "px";
  overlay.style.left = left + "px";
  overlay.style.display = "block";
  return overlay;
}

function _closeOnOutsideClick(overlay) {
  setTimeout(() => {
    document.addEventListener("click", e => {
      if (!overlay.contains(e.target)) closeAllPickers();
    }, { once: true });
  }, 0);
}

// ── Layout picker ────────────────────────────────────────────────────────────
function openLayoutPicker(anchorEl) {
  closeAllPickers();
  const overlay = _openPickerAt(anchorEl);
  const combo = __currentProject.combination;
  const content = document.getElementById("pickerContent");
  content.innerHTML = `<div class="picker-list">${LAYOUTS.map(L => {
    const active = L.id === combo.layoutId;
    return `<div class="picker-item${active ? " active" : ""}" data-id="${esc(L.id)}">
      <div class="picker-item-name">${esc(L.name)}</div>
      <div class="picker-item-sub">${esc(L.sub)}</div>
    </div>`;
  }).join("")}</div>`;
  content.querySelectorAll(".picker-item[data-id]").forEach(el => {
    el.addEventListener("click", () => {
      const layoutId = el.dataset.id;
      if (layoutId === combo.layoutId) { closeAllPickers(); return; }
      __currentProject.combination = { ...combo, layoutId };
      __currentPageId = null; // will reset to primary in renderEditor
      closeAllPickers();
      renderEditor("Layout → " + layoutId);
    });
  });
  _closeOnOutsideClick(overlay);
}

// ── Palette picker — searchable, grouped by family ───────────────────────────
function openPalettePicker(anchorEl) {
  closeAllPickers();
  const overlay = _openPickerAt(anchorEl);
  const combo = __currentProject.combination;
  const content = document.getElementById("pickerContent");
  content.innerHTML = `
    <div class="picker-header">
      <input class="picker-search" id="paletteSearch" placeholder="Search palettes…" autocomplete="off">
    </div>
    <div class="picker-list" id="paletteList"></div>`;

  const render = (q) => {
    const lq = (q || "").toLowerCase();
    const list = document.getElementById("paletteList");
    let html = ""; let lastFam = null;
    for (const pal of PALETTES) {
      if (lq && !pal.name.toLowerCase().includes(lq) && !pal.feel.toLowerCase().includes(lq) && !pal.family.includes(lq)) continue;
      if (pal.family !== lastFam) {
        html += `<div class="picker-group-label">${esc(FAMILY_LABELS[pal.family] || pal.family)}</div>`;
        lastFam = pal.family;
      }
      const active = pal.id === combo.paletteId;
      html += `<div class="picker-item${active ? " active" : ""}" data-id="${esc(pal.id)}">
        <span class="picker-swatch" style="background:${esc(pal.slots.BODY)};border-color:${esc(pal.slots.ROW)};"></span>
        <span class="picker-swatch" style="background:${esc(pal.slots.BRAND)};"></span>
        <span class="picker-item-name">${esc(pal.name.replace(/^\d+ · /, "").replace(/ \[.*$/, ""))}</span>
      </div>`;
    }
    if (!html) html = `<div class="picker-item" style="opacity:0.5;cursor:default;">No results</div>`;
    list.innerHTML = html;
    list.querySelectorAll(".picker-item[data-id]").forEach(el => {
      el.addEventListener("click", () => {
        __currentProject.combination = { ...combo, paletteId: el.dataset.id };
        closeAllPickers();
        renderEditor("Palette → " + el.dataset.id);
      });
    });
  };

  render("");
  const searchInput = document.getElementById("paletteSearch");
  searchInput.addEventListener("input", e => render(e.target.value));
  setTimeout(() => {
    searchInput.focus();
    document.addEventListener("click", e => {
      if (!overlay.contains(e.target)) closeAllPickers();
    }, { once: true });
  }, 0);
}

// ── Typography picker ─────────────────────────────────────────────────────────
function openTypoPicker(anchorEl) {

// Close all pickers on Escape
document.addEventListener("keydown", e => { if (e.key === "Escape") closeAllPickers(); });

// ── Page tabs — interactive switching, + add, × remove (chunk 2.3) ──────────
function renderPageTabs(layout, supportedPages) {
  const primary = supportedPages[0];

  // Ensure pageOrder is valid: only pages the layout supports.
  let pageOrder = (__currentProject.pageOrder || []).filter(pid => supportedPages.includes(pid));
  if (!pageOrder.includes(primary)) pageOrder.unshift(primary);
  __currentProject.pageOrder = pageOrder;

  // Build tab buttons
  let html = "";
  for (const pid of pageOrder) {
    const isActive = pid === __currentPageId;
    const isPrimary = pid === primary;
    const cls = "page-tab" + (isActive ? " active" : "");
    // Primary tab gets no × button; others do
    const removeX = isPrimary ? "" : `<button class="page-tab-remove" data-pid="${esc(pid)}" title="Remove ${esc(pid)} page" aria-label="Remove ${esc(pid)} page">×</button>`;
    html += `<button class="${cls}" data-pid="${esc(pid)}">${esc(pid)}${removeX}</button>`;
  }

  // + page button (if layout has unused pages and we're under the 5-page cap)
  const unused = supportedPages.filter(pid => !pageOrder.includes(pid));
  if (unused.length > 0 && pageOrder.length < SLOT_DEFS.maxPages) {
    html += `<button class="page-tab-add" id="addPageBtn" title="Add a page">+ page</button>`;
  }

  // Ensure the tab strip host element exists
  let host = document.getElementById("pageTabsHost");
  if (!host) {
    host = document.createElement("div");
    host.className = "page-tabs";
    host.id = "pageTabsHost";
    $("#formCol").prepend(host);
  }
  host.innerHTML = html;

  // Wire tab clicks (ignore clicks that land on the × button)
  host.querySelectorAll(".page-tab[data-pid]").forEach(btn => {
    btn.addEventListener("click", e => {
      if (e.target.classList.contains("page-tab-remove")) return;
      const pid = btn.dataset.pid;
      if (!pid || pid === __currentPageId) return;
      __currentPageId = pid;
      renderEditor();
    });
  });

  // Wire × remove buttons
  host.querySelectorAll(".page-tab-remove").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const pid = btn.dataset.pid;
      if (!pid || pid === primary) return;
      if (!confirm(`Remove the "${pid}" page? Its content stays in memory — add it back to restore it.`)) return;
      const idx = __currentProject.pageOrder.indexOf(pid);
      if (idx > -1) __currentProject.pageOrder.splice(idx, 1);
      if (__currentPageId === pid) __currentPageId = primary;
      renderEditor();
    });
  });

  // Wire + button
  const addBtn = host.querySelector("#addPageBtn");
  if (addBtn) {
    addBtn.addEventListener("click", e => {
      e.stopPropagation();
      _openAddPagePopover(addBtn, supportedPages, pageOrder);
    });
  }
}

function _openAddPagePopover(anchorEl, supportedPages, currentPageOrder) {
  closeAllPickers();
  const unused = supportedPages.filter(pid => !currentPageOrder.includes(pid));
  const popover = document.getElementById("addPagePopover");
  popover.innerHTML = "";
  if (!unused.length) {
    popover.innerHTML = `<div class="add-page-empty">All supported pages already added.</div>`;
  } else {
    unused.forEach(pid => {
      const btn = document.createElement("button");
      btn.className = "add-page-item";
      btn.textContent = pid.charAt(0).toUpperCase() + pid.slice(1);
      btn.addEventListener("click", () => {
        closeAllPickers();
        if (!__currentProject.pageOrder) __currentProject.pageOrder = [];
        __currentProject.pageOrder.push(pid);
        __currentPageId = pid;
        renderEditor();
      });
      popover.appendChild(btn);
    });
  }
  const rect = anchorEl.getBoundingClientRect();
  popover.style.top = (rect.bottom + 4) + "px";
  popover.style.left = rect.left + "px";
  popover.style.display = "block";
  setTimeout(() => document.addEventListener("click", closeAllPickers, { once: true }), 0);
}

// ── Build the content form for the active page. Walks SLOT_DEFS for site
//    slots first (always present), then the active page's slots. For each
//    slot, emits a field appropriate to its type. Chunk 2.1 only fully wires
//    text fields; everything else is a "coming in chunk 2.x" stub.
function renderForm(layout) {
  const formCol = $("#formCol");
  // Preserve the page-tabs host if it exists, replace everything else
  const tabsHost = document.getElementById("pageTabsHost");
  formCol.innerHTML = "";
  if (tabsHost) formCol.appendChild(tabsHost);

  const siteSlots = SLOT_DEFS.site || [];
  const pageSlots = (SLOT_DEFS.pages && SLOT_DEFS.pages[__currentPageId]) || [];

  // ── Site section
  formCol.appendChild(buildSectionLabel("Site"));
  for (const slot of siteSlots) {
    formCol.appendChild(buildField(slot, "site", null));
  }

  // ── Page section
  const pageLabel = __currentPageId.charAt(0).toUpperCase() + __currentPageId.slice(1);
  formCol.appendChild(buildSectionLabel("Page · " + pageLabel));
  for (const slot of pageSlots) {
    formCol.appendChild(buildField(slot, "page", __currentPageId));
  }
}

function buildSectionLabel(text) {
  const el = document.createElement("div");
  el.className = "form-section-label";
  el.textContent = text;
  return el;
}

// Build a single field DOM node for one slot. Dispatcher — picks the
// per-type builder. Each builder reads its current value from __currentProject
// and wires its mutation handlers to writeSlotValue + renderPreview.
function buildField(slot, scope, pageId) {
  const wrap = document.createElement("div");
  wrap.className = "field";

  const label = document.createElement("label");
  label.className = "field-label";
  label.textContent = SLOT_LABELS[slot.name] ||
    slot.name.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
  wrap.appendChild(label);

  const value = readSlotValue(scope, pageId, slot.name);

  switch (slot.type) {
    case "text":     buildTextField(wrap, slot, scope, pageId, value); break;
    case "longtext": buildLongtextField(wrap, slot, scope, pageId, value); break;
    case "list":     buildListField(wrap, slot, scope, pageId, value); break;
    case "links":    buildLinksField(wrap, slot, scope, pageId, value); break;
    case "image":    buildImageField(wrap, slot, scope, pageId, value); break;
    default:         buildUnknownStub(wrap, slot, value); break;
  }
  return wrap;
}

// ── text ──────────────────────────────────────────────────────────────────
function buildTextField(wrap, slot, scope, pageId, value) {
  const input = document.createElement("input");
  input.type = "text";
  input.value = value == null ? "" : String(value);
  input.dataset.slotName = slot.name;
  input.dataset.scope = scope;
  if (pageId) input.dataset.pageId = pageId;
  input.addEventListener("input", onTextChange);
  wrap.appendChild(input);

  // Soft length hint (only for slots with a defined limit)
  if (SLOT_SOFT_LIMITS[slot.name]) {
    const meta = document.createElement("div");
    meta.className = "field-meta";
    const countEl = document.createElement("span");
    countEl.className = "char-count";
    meta.appendChild(countEl);
    wrap.appendChild(meta);
    updateCharCount(input, slot.name);
  }
}

// ── longtext ──────────────────────────────────────────────────────────────
// Markdown textarea. Phase 2 chunk 2.2 ships a plain monospace textarea
// instead of Tiptap (see PLAN.md changelog 2026-04-09 for the deferral note).
// Data model is identical: markdown string in, markdown string out, byte-
// identical round-trip via the .kagaz file.
function buildLongtextField(wrap, slot, scope, pageId, value) {
  const ta = document.createElement("textarea");
  ta.value = value == null ? "" : String(value);
  ta.dataset.slotName = slot.name;
  ta.dataset.scope = scope;
  if (pageId) ta.dataset.pageId = pageId;
  ta.rows = Math.max(4, Math.min(12, (ta.value.match(/\n/g) || []).length + 3));
  ta.placeholder = "Markdown supported: **bold**, *italic*, [links](url), - lists";
  ta.addEventListener("input", onLongtextChange);
  wrap.appendChild(ta);

  const meta = document.createElement("div");
  meta.className = "field-meta";
  const charCount = document.createElement("span");
  charCount.className = "char-count";
  const hint = document.createElement("span");
  hint.className = "meta-hint";
  hint.textContent = "markdown";
  meta.appendChild(charCount);
  meta.appendChild(hint);
  wrap.appendChild(meta);
  // Initial count
  _updateLongtextCount(charCount, ta.value.length);
}

function _updateLongtextCount(el, len) {
  el.textContent = len > LONGTEXT_SOFT_LIMIT ? `${len} / ${LONGTEXT_SOFT_LIMIT} ⚠` : `${len} chars`;
  el.classList.toggle("over", len > LONGTEXT_SOFT_LIMIT);
}

function onLongtextChange(e) {
  const ta = e.currentTarget;
  const slotName = ta.dataset.slotName;
  const scope = ta.dataset.scope;
  const pageId = ta.dataset.pageId || null;
  writeSlotValue(scope, pageId, slotName, ta.value);
  const counter = ta.parentElement.querySelector(".char-count");
  if (counter) _updateLongtextCount(counter, ta.value.length);
  renderPreview();
  refreshStatusFromProject();
}

// ── list ──────────────────────────────────────────────────────────────────
// Repeatable items with inline sub-field inputs + ↑↓✕ controls + add button.
// Item shape: { id: "<4chars>", ...subFields }. Sub-field types are read from
// slot.item[]. Text sub-fields get inputs; image sub-fields get a stub
// (chunk 2.3). All edits flow through writeSlotValue → renderPreview.
function buildListField(wrap, slot, scope, pageId, value) {
  const editor = document.createElement("div");
  editor.className = "list-editor";
  editor.dataset.slotName = slot.name;
  editor.dataset.scope = scope;
  if (pageId) editor.dataset.pageId = pageId;

  const items = Array.isArray(value) ? value : [];
  if (items.length === 0) {
    const empty = document.createElement("div");
    empty.className = "list-empty";
    empty.textContent = "No items yet — click + Add item below to start.";
    editor.appendChild(empty);
  } else {
    items.forEach((item, idx) => {
      editor.appendChild(buildListItemRow(slot, scope, pageId, item, idx, items.length));
    });
  }

  const addBtn = document.createElement("button");
  addBtn.type = "button";
  addBtn.className = "list-add";
  addBtn.textContent = "+ Add item";
  addBtn.addEventListener("click", () => onListAdd(slot, scope, pageId));
  editor.appendChild(addBtn);

  wrap.appendChild(editor);
}

function buildListItemRow(slot, scope, pageId, item, idx, total) {
  const row = document.createElement("div");
  row.className = "list-item";
  row.dataset.itemIdx = String(idx);

  const indexBadge = document.createElement("div");
  indexBadge.className = "list-item-index";
  indexBadge.textContent = `#${idx + 1}`;
  row.appendChild(indexBadge);

  const controls = document.createElement("div");
  controls.className = "list-item-controls";
  const upBtn = controlButton("↑", "Move up", () => onListMove(slot, scope, pageId, idx, idx - 1), idx === 0);
  const downBtn = controlButton("↓", "Move down", () => onListMove(slot, scope, pageId, idx, idx + 1), idx === total - 1);
  const delBtn = controlButton("✕", "Delete", () => onListDelete(slot, scope, pageId, idx), false);
  delBtn.classList.add("control-delete");
  controls.appendChild(upBtn);
  controls.appendChild(downBtn);
  controls.appendChild(delBtn);
  row.appendChild(controls);

  const body = document.createElement("div");
  body.className = "list-item-body";
  for (const subSlot of (slot.item || [])) {
    body.appendChild(buildSubField(slot.name, scope, pageId, idx, subSlot, item[subSlot.name]));
  }
  row.appendChild(body);

  return row;
}

function buildSubField(parentSlotName, scope, pageId, itemIdx, subSlot, value) {
  const wrap = document.createElement("div");
  wrap.className = "sub-field";

  const label = document.createElement("label");
  label.className = "sub-field-label";
  label.textContent = subSlot.name;
  wrap.appendChild(label);

  if (subSlot.type === "text") {
    const input = document.createElement("input");
    input.type = "text";
    input.value = value == null ? "" : String(value);
    input.dataset.parentSlot = parentSlotName;
    input.dataset.scope = scope;
    if (pageId) input.dataset.pageId = pageId;
    input.dataset.itemIdx = String(itemIdx);
    input.dataset.subSlot = subSlot.name;
    input.addEventListener("input", onSubFieldTextChange);
    wrap.appendChild(input);
  } else if (subSlot.type === "image") {
    // Inline image sub-field: same drop zone / thumbnail pattern, targets list item
    const imgValue = value; // {asset, alt} or null
    if (imgValue && imgValue.asset) {
      const entry = __currentProject.assetMap && __currentProject.assetMap.get(imgValue.asset);
      const pv = document.createElement("div");
      pv.className = "image-preview-wrap";
      if (entry && entry.url) {
        const im = document.createElement("img");
        im.src = entry.url; im.alt = imgValue.alt || "";
        pv.appendChild(im);
      }
      const inf = document.createElement("div");
      inf.className = "image-info";
      inf.textContent = entry ? `${entry.mime || "image"}` : "(not in memory)";
      pv.appendChild(inf);
      wrap.appendChild(pv);
      const rb = document.createElement("button");
      rb.className = "image-remove-btn"; rb.textContent = "Remove";
      rb.addEventListener("click", () => {
        const list = readSlotValue(scope, pageId, parentSlotName) || [];
        if (list[itemIdx]) { list[itemIdx][subSlot.name] = null; writeSlotValue(scope, pageId, parentSlotName, list); }
        rebuildFormPreservingFocus(); renderPreview();
      });
      wrap.appendChild(rb);
    } else {
      const dz = document.createElement("div");
      dz.className = "drop-zone"; dz.style.padding = "10px";
      dz.setAttribute("role","button"); dz.setAttribute("tabindex","0");
      dz.innerHTML = `<div style="font-size:10px;">Drop / click to add image</div>`;
      const fi = document.createElement("input");
      fi.type = "file"; fi.accept = "image/*"; fi.style.display = "none";
      const pickFn = () => fi.click();
      dz.addEventListener("click", pickFn);
      dz.addEventListener("keydown", e => { if (e.key==="Enter"||e.key===" ") {e.preventDefault();fi.click();} });
      dz.addEventListener("dragover", e => {e.preventDefault();dz.classList.add("drag-over");});
      dz.addEventListener("dragleave", () => dz.classList.remove("drag-over"));
      dz.addEventListener("drop", e => {
        e.preventDefault(); dz.classList.remove("drag-over");
        const f = e.dataTransfer.files && e.dataTransfer.files[0];
        if (f && f.type.startsWith("image/")) _processSubImage(f, scope, pageId, parentSlotName, itemIdx, subSlot.name);
      });
      fi.addEventListener("change", e => {
        const f = e.target.files && e.target.files[0];
        if (f) _processSubImage(f, scope, pageId, parentSlotName, itemIdx, subSlot.name);
        fi.value = "";
      });
      wrap.appendChild(dz); wrap.appendChild(fi);
    }
  } else {
    const stub = document.createElement("div");
    stub.className = "sub-field-stub";
    stub.textContent = `${subSlot.type} — editor not yet wired`;
    wrap.appendChild(stub);
  }
  return wrap;
}

function controlButton(text, title, onClick, disabled) {
  const btn = document.createElement("button");
  btn.type = "button";
  btn.textContent = text;
  btn.title = title;
  if (disabled) btn.disabled = true;
  else btn.addEventListener("click", onClick);
  return btn;
}

function onSubFieldTextChange(e) {
  const input = e.currentTarget;
  const parentSlotName = input.dataset.parentSlot;
  const scope = input.dataset.scope;
  const pageId = input.dataset.pageId || null;
  const itemIdx = parseInt(input.dataset.itemIdx, 10);
  const subSlotName = input.dataset.subSlot;
  const list = readSlotValue(scope, pageId, parentSlotName);
  if (!Array.isArray(list) || itemIdx < 0 || itemIdx >= list.length) return;
  list[itemIdx][subSlotName] = input.value;
  renderPreview();
  refreshStatusFromProject();
}

function onListAdd(slot, scope, pageId) {
  let list = readSlotValue(scope, pageId, slot.name);
  if (!Array.isArray(list)) {
    list = [];
    writeSlotValue(scope, pageId, slot.name, list);
  }
  const newItem = { id: newId() };
  for (const subSlot of (slot.item || [])) {
    if (subSlot.type === "text") newItem[subSlot.name] = "";
    else if (subSlot.type === "image") newItem[subSlot.name] = null;
  }
  list.push(newItem);
  // Form needs full rebuild because the row count changed
  rebuildFormPreservingFocus();
  renderPreview();
  refreshStatusFromProject();
}

function onListDelete(slot, scope, pageId, idx) {
  const list = readSlotValue(scope, pageId, slot.name);
  if (!Array.isArray(list) || idx < 0 || idx >= list.length) return;
  list.splice(idx, 1);
  rebuildFormPreservingFocus();
  renderPreview();
  refreshStatusFromProject();
}

function onListMove(slot, scope, pageId, fromIdx, toIdx) {
  const list = readSlotValue(scope, pageId, slot.name);
  if (!Array.isArray(list)) return;
  if (fromIdx < 0 || fromIdx >= list.length || toIdx < 0 || toIdx >= list.length) return;
  const [item] = list.splice(fromIdx, 1);
  list.splice(toIdx, 0, item);
  rebuildFormPreservingFocus();
  renderPreview();
  refreshStatusFromProject();
}

// Generate a 4-char base36 id matching the spec's pattern (e.g. "f1a2", "w7q3").
function newId() {
  const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
  let s = "";
  for (let i = 0; i < 4; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

// ── links ─────────────────────────────────────────────────────────────────
// Specialized list editor. Each item has { id, label, url, icon }. The icon

function buildLinkItemRow(slot, scope, pageId, item, idx, total) {
  const row = document.createElement("div");

  controls.appendChild(controlButton("↑", "Move up", () => onListMove(slot, scope, pageId, idx, idx - 1), idx === 0));
  controls.appendChild(controlButton("↓", "Move down", () => onListMove(slot, scope, pageId, idx, idx + 1), idx === total - 1));
  const delBtn = controlButton("✕", "Delete", () => onListDelete(slot, scope, pageId, idx), false);

function buildLinkSubField(name, type, value, parentSlotName, scope, pageId, itemIdx) {

function buildLinkIconField(item, parentSlotName, scope, pageId, itemIdx) {
  const wrap = document.createElement("div");
  wrap.className = "sub-field";
  const label = document.createElement("label");
  label.className = "sub-field-label";
  label.textContent = "icon";
  wrap.appendChild(label);

  const sel = document.createElement("select");
  sel.dataset.parentSlot = parentSlotName;
  sel.dataset.scope = scope;
  if (pageId) sel.dataset.pageId = pageId;
  sel.dataset.itemIdx = String(itemIdx);

  // Auto option, then all 14 icons

// URL change in a link item: write the URL, recompute the icon dropdown's
// "auto" label + the row's icon preview, re-render preview. Does not rebuild
// the form, so the URL input keeps focus.
function onLinkUrlChange(e) {
  const input = e.currentTarget;
  const parentSlotName = input.dataset.parentSlot;
  const scope = input.dataset.scope;
  const pageId = input.dataset.pageId || null;
  const itemIdx = parseInt(input.dataset.itemIdx, 10);
  const list = readSlotValue(scope, pageId, parentSlotName);
  if (!Array.isArray(list) || itemIdx < 0 || itemIdx >= list.length) return;
  list[itemIdx].url = input.value;

  // Update the icon dropdown's "auto" label and the row preview
  const row = input.closest(".list-item");
  if (row) {
    const sel = row.querySelector("select");
    if (sel) {
      const detected = detectIcon(input.value);
      const autoOpt = sel.querySelector('option[value=""]');
      if (autoOpt) autoOpt.textContent = `auto (${detected})`;
    }
    const iconHost = row.querySelector(".link-icon-preview");
    if (iconHost) iconHost.innerHTML = icon(list[itemIdx].icon || detectIcon(input.value));
  }
  renderPreview();
  refreshStatusFromProject();
}

function onLinkIconChange(e) {
  const sel = e.currentTarget;
  const parentSlotName = sel.dataset.parentSlot;
  const scope = sel.dataset.scope;
  const pageId = sel.dataset.pageId || null;
  const itemIdx = parseInt(sel.dataset.itemIdx, 10);
  const list = readSlotValue(scope, pageId, parentSlotName);
  if (!Array.isArray(list) || itemIdx < 0 || itemIdx >= list.length) return;
  list[itemIdx].icon = sel.value || undefined; // empty string = auto = no override

  const row = sel.closest(".list-item");
  if (row) {
    const iconHost = row.querySelector(".link-icon-preview");
    if (iconHost) iconHost.innerHTML = icon(list[itemIdx].icon || detectIcon(list[itemIdx].url));
  }
  renderPreview();
  refreshStatusFromProject();
}

function onLinkAdd(slot, scope, pageId) {

  refreshStatusFromProject();
}

    removeBtn.addEventListener("click", () => {
      writeSlotValue(scope, pageId, slot.name, null);
      rebuildFormPreservingFocus();
      renderPreview();
    });
    fieldWrap.appendChild(removeBtn);
  } else {
    const dropZone = document.createElement("div");
    dropZone.className = "drop-zone";
    dropZone.setAttribute("role", "button");
    dropZone.setAttribute("tabindex", "0");
    dropZone.innerHTML = `<div>Drop image here</div><div style="font-size:10px;margin-top:4px;opacity:0.65;">or click to select · JPEG, PNG, GIF, WebP</div>`;

    const fileInput = document.createElement("input");
    fileInput.type = "file"; fileInput.accept = "image/*"; fileInput.style.display = "none";

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); } });
    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault(); dropZone.classList.remove("drag-over");
      const f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f && f.type.startsWith("image/")) processImageFile(f, scope, pageId, slot);
    });
